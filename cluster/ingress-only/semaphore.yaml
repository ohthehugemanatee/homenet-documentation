# Exposes Semaphore (running on shoebox) through the cluster ingress at semaphore.vert.
# Set SHOEBOX_IP below to shoebox's static LAN IP before applying.
---
apiVersion: v1
kind: Endpoints
metadata:
  name: semaphore
subsets:
  - addresses:
      - ip: 10.10.10.127
    ports:
      - port: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: semaphore
spec:
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: semaphore
spec:
  rules:
  - host: semaphore.vert
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: semaphore
            port:
              number: 80
  - host: semaphore.cluster.vert
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: semaphore
            port:
              number: 80
