# Exposes Semaphore (running on shoebox) through the cluster ingress.
---
apiVersion: v1
kind: Endpoints
metadata:
  name: semaphore
  namespace: default
subsets:
  - addresses:
      - ip: 10.10.10.127
    ports:
      - port: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: semaphore
  namespace: default
spec:
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: semaphore
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/redirect-entry-point: https
    ingress.kubernetes.io/hsts-max-age: "15552000"
    ingress.kubernetes.io/hsts-include-subdomains: "true"
    ingress.kubernetes.io/hsts-preload: "true"
spec:
  rules:
  - host: semaphore.berlin.vertesi.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: semaphore
            port:
              number: 80
  tls:
  - hosts:
    - semaphore.berlin.vertesi.com
