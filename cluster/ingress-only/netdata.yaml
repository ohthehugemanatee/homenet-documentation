apiVersion: v1
kind: Endpoints
metadata:
  name: netdata
subsets:
  - addresses:
      - ip: 192.168.1.30
    ports:
      - port: 19999
---
apiVersion: v1
kind: Service
metadata:
  name: netdata
spec:
  ports:
    - protocol: TCP
      port: 80
      targetPort: 19999
---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: netdata
spec:
  rules:
  - host: netdata.vert
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: netdata
            port:
              number: 80
  - host: netdata.cluster.vert
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: netdata
            port:
              number: 80
