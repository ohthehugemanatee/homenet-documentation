apiVersion: apps/v1
kind: Deployment
metadata:
  name: jackett
spec:
  selector:
    matchLabels:
      run: jackett
  replicas: 1
  template:
    metadata:
      labels:
        run: jackett
    spec:
      volumes:
        - name: nfs-media
          persistentVolumeClaim:
            claimName: media
        - name: nfs-config
          persistentVolumeClaim:
            claimName: app-configs
      containers:
      - name: jackett
        image: linuxserver/jackett
        ports:
          - containerPort: 9117
        env:
          - name: PGID
            value: "1000"
          - name: PUID
            value: "1000"
          - name: TZ
            value: "Europe/Berlin"
        volumeMounts:
          - name: nfs-config
            mountPath: "/config"
            subPath: "jackett"
          - name: nfs-media
            mountPath: "/data"
            subPath: "Downloads"
          - name: nfs-media
            mountPath: "/downloads"
            subPath: "Downloads"
        startupProbe:
          tcpSocket:
            port: 9117
          periodSeconds: 30
          failureThreshold: 10  # 5 min grace; linuxserver s6-overlay init
        livenessProbe:
          tcpSocket:
            port: 9117
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 9117
          periodSeconds: 30
          failureThreshold: 3

---

apiVersion: v1
kind: Service
metadata:
  name: jackett
  labels:
    run: jackett
spec:
  ports:
  - port: 9117
    protocol: TCP
  selector:
    run: jackett

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jackett
  annotations:
    traefik.ingress.kubernetes.io/redirect-entry-point: https
    ingress.kubernetes.io/hsts-max-age: "15552000"
    ingress.kubernetes.io/hsts-include-subdomains: "true"
    ingress.kubernetes.io/hsts-preload: "true"
spec:
  rules:
  - host: jackett.cluster.vert
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: jackett
            port:
              number: 9117
  - host: jackett.berlin.vertesi.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: jackett
            port:
              number: 9117
  tls:
  - hosts:
    - jackett.berlin.vertesi.com
