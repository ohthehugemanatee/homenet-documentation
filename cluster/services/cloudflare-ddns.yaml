apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflare-ddns
spec:
  selector:
    matchLabels:
      run: cloudflare-ddns
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        run: cloudflare-ddns
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                - key: remoteNode
                  operator: DoesNotExist
      containers:
        - name: cloudflare-ddns
          # No health probe: oznu/cloudflare-ddns runs a timed shell loop with no
          # network listener, no lockfile, and no persistent binary to exec-check.
          # Operator sign-off: approved in Issue #19.
          image: oznu/cloudflare-ddns
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: cloudflare-ddns
                  key: token
            - name: ZONE
              value: "vertesi.com"
            - name: SUBDOMAIN
              value: "germany"
