apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      run: redis
  template:
    metadata:
      labels:
        run: redis
        name: redis
    spec:
      containers:
      - name: redis-server
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
        image: redis
        args:
          - "--appendonly"
          - "no"
          - "--maxmemory"
          - "16mb"
          - "--maxmemory-policy"
          - "allkeys-lru"
          - "--save"
          - ""
        ports:
          - name: redis-server
            containerPort: 6379
        volumeMounts:
          - name: nfs-config
            subPath: "redis"
            mountPath: "/data"
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          periodSeconds: 30
          failureThreshold: 3
        env:
          - name: ALLOW_EMPTY_PASSWORD
            value: "yes"
      volumes:
        - name: nfs-config
          persistentVolumeClaim:
            claimName: app-configs
---

apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  selector:
    run: redis
  ports:
    - name: redis
      protocol: TCP
      port: 6379
      targetPort: 6379
