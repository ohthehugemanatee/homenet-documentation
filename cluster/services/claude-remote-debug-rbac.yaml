---
# Read-only identity for ad-hoc cluster debugging from a Claude Code remote
# session (see remote-debugging.md). Bound to the built-in `view` ClusterRole,
# which excludes Secrets entirely and grants no create/exec verbs.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-remote-debug
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: claude-remote-debug-view
subjects:
  - kind: ServiceAccount
    name: claude-remote-debug
    namespace: default
roleRef:
  kind: ClusterRole
  name: view
  apiGroup: rbac.authorization.k8s.io
