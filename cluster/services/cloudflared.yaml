---
# Outbound-only Cloudflare Tunnel client. Makes no inbound connections and
# never calls the Kubernetes API itself — the tunnel's origin/ingress rule
# (routing the public hostname to kubernetes.default.svc) is configured in
# the Cloudflare dashboard, not in this repo. See remote-debugging.md.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      automountServiceAccountToken: false
      containers:
        - name: cloudflared
          # Check https://github.com/cloudflare/cloudflared/releases for the
          # current stable tag before bumping — this pod fronts the API
          # server, so treat a stale tag here as higher-priority than most.
          image: cloudflare/cloudflared:2026.6.1
          args:
            - tunnel
            - --no-autoupdate
            - --metrics
            - 0.0.0.0:2000
            - run
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  # CHANGEME: created out-of-band, never committed. See
                  # remote-debugging.md for how to mint it in the Cloudflare
                  # dashboard and create this secret:
                  #   kubectl create secret generic cloudflared-tunnel-credentials \
                  #     --from-literal=token=<tunnel-token> -n default
                  name: cloudflared-tunnel-credentials
                  key: token
          ports:
            - name: metrics
              containerPort: 2000
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /ready
              port: metrics
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ready
              port: metrics
            periodSeconds: 30
            # Looser than readiness: a transient upstream blip during
            # reconnect shouldn't trigger a restart/reconnect storm.
            failureThreshold: 6
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: tmp
          emptyDir: {}
