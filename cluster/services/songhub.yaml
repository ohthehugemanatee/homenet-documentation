apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: songhub
  namespace: default
spec:
  selector:
    matchLabels:
      run: songhub
  replicas: 1
  serviceName: songhub
  volumeClaimTemplates:
    - metadata:
        name: songhub-saved-tabs
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: "longhorn"
        resources:
          requests:
            storage: 5Gi
  template:
    metadata:
      labels:
        run: songhub
    spec:
      containers:
        - name: songhub
          # Built from a pinned upstream tag by
          # .github/workflows/build-songhub-image.yaml — bump both together.
          # First deploy: the ghcr.io/ohthehugemanatee/songhub package
          # defaults to private and must be set public (or an
          # imagePullSecret added here) or this pod sits in ImagePullBackOff.
          image: ghcr.io/ohthehugemanatee/songhub:v1.7
          ports:
            - containerPort: 3005
          env:
            - name: SONGHUB_SAVED_TABS_DIR
              value: /app/saved-tabs
            - name: SONGHUB_LOGIN_USERNAME
              valueFrom:
                secretKeyRef:
                  # CHANGEME: created out-of-band, never committed:
                  #   kubectl create secret generic songhub-credentials \
                  #     --from-literal=login-username=<user> \
                  #     --from-literal=login-password=<password> \
                  #     --from-literal=admin-username=<admin-user> \
                  #     --from-literal=admin-password=<admin-password> \
                  #     -n default
                  name: songhub-credentials
                  key: login-username
            - name: SONGHUB_LOGIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: songhub-credentials
                  key: login-password
            - name: SONGHUB_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: songhub-credentials
                  key: admin-username
            - name: SONGHUB_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: songhub-credentials
                  key: admin-password
          volumeMounts:
            - name: songhub-saved-tabs
              mountPath: /app/saved-tabs
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          # Node build + Xvfb + headless Chromium cold start; upstream's own
          # docker-compose healthcheck uses a 20s start_period against the
          # same endpoint.
          startupProbe:
            httpGet:
              path: /api/health
              port: 3005
            periodSeconds: 10
            failureThreshold: 9   # ~90s grace for first boot / image pull
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3005
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3005
            periodSeconds: 15
            failureThreshold: 3

        - name: remarkable-sync
          # Built from cluster/Dockerfiles/remarkable-sync/ by
          # .github/workflows/build-remarkable-sync-image.yaml. Converts
          # SongHub's saved *.ultimatetab.json tabs to PDF and pushes them
          # to reMarkable Cloud via rmapi. Shares the songhub-saved-tabs
          # volume with the songhub container above (same pod, so no NFS/RWX
          # needed) and never modifies the original tab files.
          image: ghcr.io/ohthehugemanatee/remarkable-sync:v0.0.34
          env:
            - name: RMAPI_CONFIG
              value: /secrets/rmapi/rmapi.conf
            # Explicit (matches the image's own default) rather than relying
            # solely on the Dockerfile ENV: the livenessProbe below also
            # references this var, and an unset var would silently evaluate
            # to 0 in the probe's shell arithmetic, not the image default.
            - name: SYNC_INTERVAL_SECONDS
              value: "1800"
          volumeMounts:
            - name: songhub-saved-tabs
              mountPath: /app/saved-tabs
            - name: remarkable-rmapi-token
              mountPath: /secrets/rmapi
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          # No network listener - the sync loop touches HEARTBEAT_FILE
          # (default /tmp/heartbeat) at the end of every cycle, every
          # SYNC_INTERVAL_SECONDS (default 1800s, set in the image).
          # Readiness: file exists, proving the loop completed at least once.
          readinessProbe:
            exec:
              command: ["test", "-f", "/tmp/heartbeat"]
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 5
          # Liveness: file is fresh, catching a hung loop. 2x interval grace
          # so one slow cycle (e.g. a large batch of new tabs) doesn't flap.
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - test $(( $(date +%s) - $(stat -c %Y /tmp/heartbeat 2>/dev/null || echo 0) )) -lt $((2 * ${SYNC_INTERVAL_SECONDS:-1800}))
            initialDelaySeconds: 60
            periodSeconds: 300
            failureThreshold: 2
      volumes:
        - name: remarkable-rmapi-token
          secret:
            # CHANGEME: created out-of-band, never committed. One-time
            # interactive pairing (cannot be automated):
            #   1. Visit my.remarkable.com/connect/remarkable for a
            #      one-time code.
            #   2. Run `rmapi` once locally/interactively to mint
            #      ~/.config/rmapi/rmapi.conf (or wherever RMAPI_CONFIG
            #      points for your rmapi version - confirm against the
            #      pinned ddvk/rmapi release).
            #   3. kubectl create secret generic remarkable-rmapi-token \
            #        --from-file=rmapi.conf=<path-to-minted-config> \
            #        -n default
            secretName: remarkable-rmapi-token

---

apiVersion: v1
kind: Service
metadata:
  name: songhub
  namespace: default
  labels:
    run: songhub
spec:
  ports:
  - port: 3005
    protocol: TCP
  selector:
    run: songhub

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: songhub
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/redirect-entry-point: https
    ingress.kubernetes.io/hsts-max-age: "15552000"
    ingress.kubernetes.io/hsts-include-subdomains: "true"
    ingress.kubernetes.io/hsts-preload: "true"
spec:
  rules:
  - host: songhub.cluster.vert
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: songhub
            port:
              number: 3005
  - host: songhub.berlin.vertesi.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: songhub
            port:
              number: 3005
  tls:
  - hosts:
    - songhub.berlin.vertesi.com
