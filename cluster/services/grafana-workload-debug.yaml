apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-workload-debug
  namespace: monitoring
  labels:
    grafana_dashboard: "1"  # picked up by kube-prometheus-stack grafana-sc-dashboard sidecar
data:
  # Landing dashboard for alert notifications. Alertmanager's Pushover "Debug in
  # Grafana" button deep-links here with var-namespace/var-pod pre-filled
  # (uid must stay "workload-debug" — the alert URL references it).
  # Datasources are referenced by their provisioned names: Prometheus, Loki.
  workload-debug.json: |
    {
      "title": "Workload Debug",
      "uid": "workload-debug",
      "schemaVersion": 36,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "label": "Namespace",
            "datasource": "Prometheus",
            "query": "label_values(kube_pod_info, namespace)",
            "definition": "label_values(kube_pod_info, namespace)",
            "refresh": 2,
            "sort": 1,
            "includeAll": true,
            "allValue": ".*",
            "multi": false
          },
          {
            "name": "pod",
            "type": "query",
            "label": "Pod",
            "datasource": "Prometheus",
            "query": "label_values(kube_pod_info{namespace=~\"$namespace\"}, pod)",
            "definition": "label_values(kube_pod_info{namespace=~\"$namespace\"}, pod)",
            "refresh": 2,
            "sort": 1,
            "includeAll": true,
            "allValue": ".*",
            "multi": true
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "table",
          "title": "Firing Alerts",
          "datasource": "Prometheus",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 6 },
          "transformations": [
            {
              "id": "filterFieldsByName",
              "options": {
                "include": { "names": ["alertname", "severity", "pod", "container"] }
              }
            }
          ],
          "targets": [
            {
              "datasource": "Prometheus",
              "expr": "ALERTS{namespace=~\"$namespace\", alertstate=\"firing\"}",
              "instant": true,
              "format": "table",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "type": "logs",
          "title": "Kubernetes Events",
          "datasource": "Loki",
          "gridPos": { "x": 0, "y": 6, "w": 24, "h": 8 },
          "options": { "showTime": true, "wrapLogMessage": true, "sortOrder": "Descending" },
          "targets": [
            {
              "datasource": "Loki",
              "expr": "{job=\"kubernetes-event-exporter\", namespace=~\"$namespace\"}",
              "queryType": "range",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "logs",
          "title": "Pod Logs",
          "datasource": "Loki",
          "gridPos": { "x": 0, "y": 14, "w": 24, "h": 10 },
          "options": { "showTime": true, "wrapLogMessage": true, "sortOrder": "Descending" },
          "targets": [
            {
              "datasource": "Loki",
              "expr": "{namespace=~\"$namespace\", pod=~\"$pod\"}",
              "queryType": "range",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "CPU Usage (cores)",
          "datasource": "Prometheus",
          "gridPos": { "x": 0, "y": 24, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "short" } },
          "targets": [
            {
              "datasource": "Prometheus",
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=~\"$namespace\", pod=~\"$pod\", container!=\"\"}[5m]))",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Memory Working Set",
          "datasource": "Prometheus",
          "gridPos": { "x": 12, "y": 24, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "bytes" } },
          "targets": [
            {
              "datasource": "Prometheus",
              "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=~\"$namespace\", pod=~\"$pod\", container!=\"\"})",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Disk I/O",
          "datasource": "Prometheus",
          "gridPos": { "x": 0, "y": 32, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "Bps" } },
          "targets": [
            {
              "datasource": "Prometheus",
              "expr": "sum by (pod) (rate(container_fs_reads_bytes_total{namespace=~\"$namespace\", pod=~\"$pod\"}[5m]))",
              "legendFormat": "read {{pod}}",
              "refId": "A"
            },
            {
              "datasource": "Prometheus",
              "expr": "sum by (pod) (rate(container_fs_writes_bytes_total{namespace=~\"$namespace\", pod=~\"$pod\"}[5m]))",
              "legendFormat": "write {{pod}}",
              "refId": "B"
            }
          ]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Network I/O",
          "datasource": "Prometheus",
          "gridPos": { "x": 12, "y": 32, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "Bps" } },
          "targets": [
            {
              "datasource": "Prometheus",
              "expr": "sum by (pod) (rate(container_network_receive_bytes_total{namespace=~\"$namespace\", pod=~\"$pod\"}[5m]))",
              "legendFormat": "rx {{pod}}",
              "refId": "A"
            },
            {
              "datasource": "Prometheus",
              "expr": "sum by (pod) (rate(container_network_transmit_bytes_total{namespace=~\"$namespace\", pod=~\"$pod\"}[5m]))",
              "legendFormat": "tx {{pod}}",
              "refId": "B"
            }
          ]
        },
        {
          "id": 8,
          "type": "table",
          "title": "ArgoCD App Status",
          "datasource": "Prometheus",
          "gridPos": { "x": 0, "y": 40, "w": 24, "h": 6 },
          "links": [
            {
              "title": "Open in ArgoCD",
              "url": "https://argocd.berlin.vertesi.com/applications?search=${namespace}",
              "targetBlank": true
            }
          ],
          "transformations": [
            {
              "id": "filterFieldsByName",
              "options": {
                "include": { "names": ["name", "sync_status", "health_status"] }
              }
            }
          ],
          "targets": [
            {
              "datasource": "Prometheus",
              "expr": "argocd_app_info{dest_namespace=~\"$namespace\"}",
              "instant": true,
              "format": "table",
              "refId": "A"
            }
          ]
        }
      ]
    }
