apiVersion: apps/v1
kind: Deployment
metadata:
  name: delugevpn
spec:
  selector:
    matchLabels:
      run: delugevpn
  replicas: 1
  template:
    metadata:
      labels:
        run: delugevpn
    spec:
      nodeSelector:
        beta.kubernetes.io/arch: amd64
      volumes:
        - name: nfs-media
          persistentVolumeClaim:
            claimName: media
        - name: nfs-config
          persistentVolumeClaim:
            claimName: app-configs
      containers:
      - name: delugevpn
        image: binhex/arch-delugevpn
        imagePullPolicy: Always
        ports:
          - containerPort: 8112
          - containerPort: 58846
        env:
          - name: PGID
            value: "1000"
          - name: PUID
            value: "1000"
          - name: TZ
            value: "Europe/Berlin"
          - name: ENABLE_PRIVOXY
            value: "no"
          - name: LAN_NETWORK
            value: "192.168.1.0/24"
          - name: NAME_SERVERS
            value: "1.1.1.1"
          - name: VPN_ENABLED
            value: "yes"
          - name: VPN_PASS
            valueFrom:
              secretKeyRef:
                name: pia-vpn
                key: password
          - name: VPN_USER
            valueFrom:
              secretKeyRef:
                name: pia-vpn
                key: username
          - name: VPN_PROV
            value: "pia"
        volumeMounts:
          - name: nfs-config
            mountPath: "/config"
            subPath: "delugevpn"
          - name: nfs-media
            mountPath: "/data"
            subPath: "Downloads"
          - name: nfs-media
            mountPath: "/downloads"
            subPath: "Downloads"
        startupProbe:
          tcpSocket:
            port: 8112
          periodSeconds: 30
          failureThreshold: 20  # 10 min grace; VPN TLS negotiation before web UI is reachable
        livenessProbe:
          tcpSocket:
            port: 8112
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 8112
          periodSeconds: 30
          failureThreshold: 3
        securityContext:
          capabilities:
            add:
              - NET_ADMIN

---

apiVersion: v1
kind: Service
metadata:
  name: delugevpn
  labels:
    run: delugevpn
spec:
  ports:
  - name: http
    port: 8112
    protocol: TCP
  - name: api
    port: 58846
    protocol: TCP
  selector:
    run: delugevpn

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: delugevpn
  annotations:
    traefik.ingress.kubernetes.io/redirect-entry-point: https
    ingress.kubernetes.io/hsts-max-age: "15552000"
    ingress.kubernetes.io/hsts-include-subdomains: "true"
    ingress.kubernetes.io/hsts-preload: "true"
spec:
  rules:
  - host: deluge.cluster.vert
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: delugevpn
            port:
              number: 8112
  - host: deluge.vert
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: delugevpn
            port:
              number: 8112
  - host: deluge.berlin.vertesi.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: delugevpn
            port:
              number: 8112
  tls:
  - hosts:
    - deluge.berlin.vertesi.com
