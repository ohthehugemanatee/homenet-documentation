apiVersion: apps/v1
kind: Deployment
metadata:
  name: vton
  namespace: default
spec:
  selector:
    matchLabels:
      run: vton
  replicas: 1
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        run: vton
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: vton
          image: ghcr.io/ohthehugemanatee/vton-web:latest
          ports:
            - containerPort: 3000
          env:
            - name: REPLICATE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vton
                  key: replicate-api-token
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12  # Next.js cold start can take ~60s
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3

---

apiVersion: v1
kind: Service
metadata:
  name: vton
  namespace: default
  labels:
    run: vton
spec:
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
  selector:
    run: vton

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vton
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/redirect-entry-point: https
spec:
  rules:
    - host: vton.cluster.vert
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vton
                port:
                  number: 80
    - host: vton.vert
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vton
                port:
                  number: 80
    - host: vton.berlin.vertesi.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vton
                port:
                  number: 80
  tls:
    - hosts:
        - vton.berlin.vertesi.com
