# system-upgrade-controller v0.19.2
# https://github.com/rancher/system-upgrade-controller/releases/tag/v0.19.2
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - https://github.com/rancher/system-upgrade-controller/releases/download/v0.19.2/crd.yaml
  - https://github.com/rancher/system-upgrade-controller/releases/download/v0.19.2/system-upgrade-controller.yaml
  - update-plans.yaml
patches:
  # The SMP target must name the CRD: kustomize cannot build a strategic-merge
  # patch against a kind-only target with no metadata.name (it fails to parse
  # the patch). The v0.19.2 release ships exactly one CRD, so naming it is
  # correct and not limiting.
  - target:
      kind: CustomResourceDefinition
      name: plans.upgrade.cattle.io
    patch: |-
      apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      metadata:
        name: plans.upgrade.cattle.io
        annotations:
          argocd.argoproj.io/sync-wave: "-1"
  - target:
      kind: Deployment
      name: system-upgrade-controller
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: system-upgrade-controller
        annotations:
          argocd.argoproj.io/sync-wave: "0"
