apiVersion: v1
kind: LimitRange
metadata:
  name: default-limit-range
spec:
  limits:
  - default:
      memory: 512Mi
      # caps an unbounded container on the weakest nodes (4-core RPi4); raise per-service if a workload needs more
      cpu: 500m
    defaultRequest:
      memory: 256Mi
      cpu: 100m
    type: Container
