---
# Scenario: upgrade health check fails, auto-rebuild succeeds.
# Expected: WARNING Pushover alert fires, failure flag cleared.
monkeyble_scenarios:
  agent_rescue_success:
    tasks_to_test:
      # ── Mock infrastructure tasks that require a real cluster ──────────────

      - task: "Verify k8s node name matches ansible_hostname"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false
              result_dict:
                resources:
                  - metadata:
                      name: testnode

      - task: "Cordon node before drain"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: true
              result_dict:
                rc: 0

      # ── cordon_drain scale_down: single-replica Longhorn workload guard ──────
      # Crafted cluster state: StatefulSet default/nextcloud has a pod on this
      # node mounting PVC nextcloud-previews, backed by a numberOfReplicas=1
      # Longhorn StorageClass. The discovery Jinja must select it for scale-down.
      - task: "Find single-replica Longhorn StorageClasses"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false
              result_dict:
                resources:
                  - metadata:
                      name: longhorn-ephemeral-fast
                    provisioner: driver.longhorn.io
                    parameters:
                      numberOfReplicas: "1"

      - task: "Find PersistentVolumeClaims on single-replica Longhorn StorageClasses"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false
              result_dict:
                resources:
                  - metadata:
                      namespace: default
                      name: nextcloud-previews
                    spec:
                      storageClassName: longhorn-ephemeral-fast

      - task: "List pods scheduled on this node"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false
              result_dict:
                resources:
                  - metadata:
                      namespace: default
                      name: nextcloud-0
                      ownerReferences:
                        - kind: StatefulSet
                          name: nextcloud
                    spec:
                      nodeName: testnode
                      volumes:
                        - persistentVolumeClaim:
                            claimName: nextcloud-previews

      - task: "Get StatefulSets"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false
              result_dict:
                resources:
                  - metadata:
                      namespace: default
                      name: nextcloud
                    spec:
                      replicas: 1

      - task: "Record pre-drain replica count on StatefulSet"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: true
              result_dict:
                rc: 0

      # Assert discovery actually selected the workload (loop not empty).
      - task: "Scale StatefulSet to zero"
        should_be_skipped: false
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: true
              result_dict:
                rc: 0

      - task: "Drain node"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: true
              result_dict:
                rc: 0

      # Mock apt tasks to avoid modifying the CI runner and for speed
      - task: "Update apt cache"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false

      - task: "Run dist-upgrade"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false   # prevents Reboot task from running

      # ── Mock node_state role tasks (configuration, not the logic under test) ──

      - task: "Install base packages"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false

      - task: "Install kernel extra modules package"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false

      - task: "Install x86 media packages"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false

      - task: "Set hostname"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false

      - task: "Template /etc/hosts"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false

      - task: "Template NFS global mount options (soft mounts)"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false

      - task: "Ensure k3s kernel modules load on boot"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false

      - task: "Load k3s kernel modules now"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false

      - task: "Template k3s sysctl parameters"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false

      - task: "ARM — ensure cgroup memory/cpuset flags in kernel cmdline"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false

      - task: "ARM — ensure cgroup v2 unified hierarchy in kernel cmdline"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false

      - task: "X86 — ensure cgroup v2 unified hierarchy in GRUB"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false

      - task: "X86 — ensure cgroup memory/cpuset flags in GRUB"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false

      - task: "X86 — update GRUB config"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false

      - task: "Flag reboot required for cgroup changes"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false

      - task: "Template timesyncd NTP config"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false

      - task: "Template unattended-upgrades config"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false

      - task: "Enable automatic security updates"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false

      - task: "Disable swap immediately"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false

      - task: "Disable swap in fstab"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false

      - task: "Configure journald volatile storage"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false

      - task: "Gather package facts for multipath check"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false
              result_dict:
                ansible_facts:
                  packages: {}

      - task: "Unmask multipathd before removal"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false

      - task: "Stop multipathd"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false

      - task: "Remove multipath-tools package"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false

      - task: "Mask multipathd to prevent accidental start"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false

      - task: "Ensure iscsid is enabled and running"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false

      # ── k3s_health role ───────────────────────────────────────────────────

      - task: "Wait for k3s-agent to become active"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false
              result_dict:
                stdout: "active"
                rc: 0

      - task: "Uncordon node"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: true
              result_dict:
                rc: 0

      - task: "Verify node is Ready"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false
              result_dict:
                rc: 0

      # ── Trigger rescue: simulate NRestarts > 3 ───────────────────────────
      # failed_when: k3s_health_restarts.stdout | int > 3 evaluates True with stdout="5"
      - task: "Verify k3s not in restart loop"
        should_fail: true
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false
              result_dict:
                stdout: "5"
                rc: 0

      # ── Rescue path: rebuild succeeds ─────────────────────────────────────
      - task: "Reinstall k3s agent"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: true
              result_dict:
                rc: 0

      - task: "Wait for k3s-agent to become active after rebuild"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false
              result_dict:
                stdout: "active"
                rc: 0

      - task: "Wait for node to rejoin cluster after rebuild"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false
              result_dict:
                rc: 0

      - task: "Uncordon node after successful rebuild"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: true
              result_dict:
                rc: 0

      # ── cordon_drain restore: scale the guarded workload back up ─────────────
      # StatefulSet default/nextcloud still carries the pre-drain annotations for
      # this node, so restore must scale it back and clear the annotations.
      - task: "Get StatefulSets for restore"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false
              result_dict:
                resources:
                  - metadata:
                      namespace: default
                      name: nextcloud
                      annotations:
                        homenet.vertesi.com/pre-drain-node: testnode
                        homenet.vertesi.com/pre-drain-replicas: "1"
                    spec:
                      replicas: 0

      # Assert restore matched this node's annotated workload (loop not empty).
      - task: "Scale StatefulSet back to pre-drain replica count"
        should_be_skipped: false
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: true
              result_dict:
                rc: 0

      - task: "Clear pre-drain annotations after restore"
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: true
              result_dict:
                rc: 0

      # ── Key assertions ────────────────────────────────────────────────────
      - task: "Alert WARNING — node auto-rebuilt and back in service"
        should_be_skipped: false   # assert it ran (not skipped)
        mock:
          config:
            hpe.monkeyble.monkeyble_module:
              consider_changed: false
