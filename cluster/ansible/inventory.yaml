all:
  vars:
    ansible_user: ubuntu
    # usb_disk: "" # Set this var on the command line if an external disk is in use.
  children:
    masters:
      hosts:
        cluster1:
          ip: 10.10.10.10
          cluster_role: "first-master"
      vars:
        # 4 GB Pi control-plane nodes with root on SD card: enable the memory
        # cushion + SD-card offload (kubelet root + pod logs onto /mnt/usb).
        node_state_zram_enabled: true
        node_state_sd_offload_enabled: true
    multimasters:
      hosts:
        cluster3:
          ansible_host: 10.10.10.111
        cluster4:
          ansible_host: 10.10.10.114
      vars:
        cluster_role: "multi-master"
        node_state_zram_enabled: true
        node_state_sd_offload_enabled: true
    agents:
      hosts:
        nuc1:
          ansible_user: ohthehugemanatee
        nuc2:
        fuji:
          ansible_user: ohthehugemanatee
        celery:
          ansible_user: ohthehugemanatee
        ubuntu:
      vars:
        cluster_role: "agent"
    shoebox:
      hosts:
        shoebox:
          ansible_host: 192.168.1.10  # update to actual shoebox IP
          ansible_user: ubuntu
