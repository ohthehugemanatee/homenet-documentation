---
node_state_ntp_servers:
  - ntp.ubuntu.com
  - 0.pool.ntp.org
  - 1.pool.ntp.org

# kube-vip control-plane VIP, added to the apiserver serving cert (tls-san) so
# the API is reachable through the floating VIP without a cert-name mismatch.
# Single source of truth for the VIP IP; override via inventory/group_vars if it
# ever changes.
node_state_k3s_api_server_vip: "10.10.10.9"

# ── Control-plane memory headroom (low-RAM nodes, e.g. 4 GB Pi masters) ──────
# Reserve RAM for the OS + the k3s control-plane process, and evict workload
# pods BEFORE the node OOM-thrashes (which on an SD-card root spirals into
# 100 % iowait and etcd quorum loss). Rendered into the k3s server config.yaml
# as kubelet-arg, so it only applies to control-plane nodes.
node_state_kubelet_system_reserved: "cpu=250m,memory=512Mi"
node_state_kubelet_kube_reserved: "memory=512Mi"
node_state_kubelet_eviction_hard: "memory.available<300Mi,nodefs.available<10%"
node_state_kubelet_eviction_minimum_reclaim: "memory.available=100Mi"

# Soft cgroup ceiling on the k3s control-plane process via a systemd drop-in.
# MemoryHigh throttles + reclaims under pressure; deliberately NOT MemoryMax,
# which would let the kernel OOM-kill the control plane itself on a low-RAM node.
node_state_k3s_memory_high: "2G"

# zram compressed-RAM swap cushion to avoid the hard OOM/thrash wall on low-RAM
# nodes. Opt-in (default off); when on, kubelet gets fail-swap-on=false and the
# blanket swapoff is scoped to leave zram alone. Enable per-group/host.
node_state_zram_enabled: false
node_state_zram_percent: 50
node_state_zram_algorithm: "zstd"

# ── USB offload: relocate heavy I/O paths off the SD-card onto the USB disk ───
# Auto-enabled for control-plane nodes (masters always have a USB data disk in
# this cluster). The runtime /mnt/usb mount check is the safety gate — if the
# disk isn't mounted, all offload tasks are skipped regardless of this flag.
# Override to false per-host to disable even when mounted.
node_state_usb_offload_enabled: >-
  {{ (cluster_role | default('agent')) in ['first-master', 'multi-master'] }}
node_state_usb_offload_links:
  - {src: /mnt/usb/k3s, dest: /var/lib/rancher/k3s}
  - {src: /mnt/usb/longhorn, dest: /var/lib/rancher/longhorn}
  - {src: /mnt/usb/kubelet, dest: /var/lib/kubelet}
  - {src: /mnt/usb/log/pods, dest: /var/log/pods}
