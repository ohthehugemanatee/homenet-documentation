---
- name: Record play failure for subsequent plays
  ansible.builtin.file:
    path: "{{ state_dir }}/rolling-upgrade-failed"
    state: touch
    mode: '0644'
  delegate_to: localhost
  become: false
  failed_when: false  # must not abort rescue — alert tasks below must still run

- name: Attempt automatic node rebuild
  block:
    - name: Uninstall k3s agent
      ansible.builtin.shell:
        cmd: /usr/local/bin/k3s-agent-uninstall.sh
        executable: /bin/bash
      failed_when: false
      changed_when: true

    - name: Reinstall k3s agent  # noqa: command-instead-of-module
      ansible.builtin.shell:
        executable: /bin/bash
        cmd: |
          set -o pipefail
          curl -sfL https://get.k3s.io | sh -s - agent
      environment:
        K3S_URL: "{{ k3s_api_server_url }}"
        K3S_TOKEN: "{{ k3s_token }}"
      changed_when: true
      no_log: true

    - name: Wait for k3s-agent to become active after rebuild  # noqa: command-instead-of-module
      ansible.builtin.command: systemctl is-active k3s-agent
      register: upgrade_rescue_agent_rebuilt
      until: upgrade_rescue_agent_rebuilt.rc == 0
      retries: 30
      delay: 10
      changed_when: false

    - name: Wait for node to rejoin cluster after rebuild
      kubernetes.core.k8s_info:
        kind: Node
        name: "{{ ansible_hostname }}"
        wait: true
        wait_condition:
          type: Ready
          status: "True"
        wait_timeout: 180
        kubeconfig: "{{ k8s_kubeconfig }}"
      delegate_to: localhost
      become: false
      changed_when: false

    - name: Uncordon node after successful rebuild
      kubernetes.core.k8s_drain:
        name: "{{ ansible_hostname }}"
        state: uncordon
        kubeconfig: "{{ k8s_kubeconfig }}"
      delegate_to: localhost
      become: false

    - name: Clear failure flag — rebuild succeeded, safe to continue
      ansible.builtin.file:
        path: "{{ state_dir }}/rolling-upgrade-failed"
        state: absent
      delegate_to: localhost
      become: false

    - name: Alert WARNING — node auto-rebuilt and back in service
      ansible.builtin.uri:
        url: https://api.pushover.net/1/messages.json
        method: POST
        timeout: 10
        body_format: form-urlencoded
        body:
          token: "{{ pushover_app_token }}"
          user: "{{ pushover_user_key }}"
          message: "WARNING: {{ inventory_hostname }} upgrade failed; auto-rebuilt, back in service."
          priority: "1"
      delegate_to: localhost
      become: false
      no_log: true
      changed_when: false

  rescue:
    - name: Alert CRITICAL — upgrade and rebuild both failed
      ansible.builtin.uri:
        url: https://api.pushover.net/1/messages.json
        method: POST
        timeout: 10
        body_format: form-urlencoded
        body:
          token: "{{ pushover_app_token }}"
          user: "{{ pushover_user_key }}"
          message: >-
            CRITICAL: {{ inventory_hostname }} upgrade+rebuild failed
            at task '{{ ansible_failed_task.name | default('unknown') }}'.
            Node DRAINED. Manual fix required.
          priority: "2"
          retry: "300"
          expire: "3600"
      delegate_to: localhost
      become: false
      no_log: true
      changed_when: false
