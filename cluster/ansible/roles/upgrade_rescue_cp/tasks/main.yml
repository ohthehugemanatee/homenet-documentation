---
- name: Record play failure for subsequent plays
  ansible.builtin.file:
    path: "{{ state_dir }}/rolling-upgrade-failed"
    state: touch
    mode: '0644'
  delegate_to: localhost
  become: false
  failed_when: false  # must not abort rescue — alert task below must still run

- name: Alert CRITICAL — control-plane node upgrade failed
  ansible.builtin.uri:
    url: https://api.pushover.net/1/messages.json
    method: POST
    body_format: form-urlencoded
    body:
      token: "{{ pushover_app_token }}"
      user: "{{ pushover_user_key }}"
      message: >-
        CRITICAL: {{ inventory_hostname }} (master) upgrade failed
        at task "{{ ansible_failed_task.name | default('unknown') }}".
        Node DRAINED. Manual fix required.
      priority: "2"
      retry: "300"
      expire: "3600"
  delegate_to: localhost
  become: false
  no_log: true
  changed_when: false
