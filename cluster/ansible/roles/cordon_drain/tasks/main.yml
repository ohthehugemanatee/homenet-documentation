---
- name: Cordon node before drain
  kubernetes.core.k8s_drain:
    name: "{{ ansible_hostname }}"
    state: cordon
    kubeconfig: "{{ k8s_kubeconfig }}"
  delegate_to: localhost
  become: false

- name: Drain node  # noqa: command-instead-of-module
  ansible.builtin.command: >-
    kubectl drain {{ ansible_hostname }}
    --ignore-daemonsets
    --delete-emptydir-data
    --grace-period={{ cordon_drain_grace_period }}
    --timeout=300s
    --kubeconfig={{ k8s_kubeconfig }}
  delegate_to: localhost
  become: false
  changed_when: true
