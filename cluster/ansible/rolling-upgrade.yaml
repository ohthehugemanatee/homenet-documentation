              priority: "2"
              retry: "300"
              expire: "3600"
          delegate_to: localhost
          become: false
          no_log: true
          changed_when: false


- name: Cleanup — clear maintenance flag
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Clear maintenance flag
      ansible.builtin.file:
        path: "{{ state_dir }}/maintenance-in-progress"
        state: absent
