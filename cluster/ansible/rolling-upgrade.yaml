---
# Rolling OS upgrade for k3s nodes.
# Drains each node, runs apt dist-upgrade, reboots, uncordons, verifies Ready.
# Safe to re-run — skips reboot if /var/run/reboot-required is absent and
# no packages were upgraded.
#
# Prerequisites:
#   - kubernetes.core collection installed; kubernetes Python library available
#   - ansible-playbook run from a machine with kubectl access
#
# Usage:
#   All nodes (rolling):  ansible-playbook -i inventory.yaml --vault-password-file /etc/ansible/vault-password \
#                           -e vault_file=group_vars/vault.yaml rolling-upgrade.yaml
#   Single node:          ansible-playbook -i inventory.yaml --vault-password-file /etc/ansible/vault-password \
#                           -e vault_file=group_vars/vault.yaml --limit cluster1 rolling-upgrade.yaml
#   Testing (no vault):   ansible-playbook -i tests/monkeyble/inventory.yml \
#                           -e vault_file=tests/monkeyble/test_secrets.yml rolling-upgrade.yaml
#
# Node ordering: agents first, then multimasters, then masters (first-master last).
# Override with --limit or -e target=<group>.
#
# strict_mode=true (strongly recommended for scheduled runs):
#   - Stops on first node failure (any_errors_fatal)
#   - Aborts subsequent plays if a prior play left nodes failed/drained
#
# WARNING: draining a k3s server node evicts non-system pods but leaves the
# control plane processes running. HA clusters (3 servers) tolerate this fine.
# Do NOT run this against all 3 servers simultaneously — serial: 1 prevents that.
#
# BEFORE RUNNING: scale down strict-local StatefulSets to avoid drain timeouts:
#   kubectl scale statefulset plex --replicas=0
#   kubectl scale statefulset nextcloud --replicas=0
# Scale back up after each node is verified Ready.

- name: Rolling OS upgrade — agents
  hosts: "{{ target | default('agents:!ubuntu') }}"
  become: true
  serial: 1
  any_errors_fatal: "{{ strict_mode | default(false) | bool }}"

  vars_files:
    - "{{ vault_file }}"

  vars:
    k3s_svc: k3s-agent

  pre_tasks:
    # mode 0775 keeps group-write so Semaphore (gid 1001) can touch the flag.
    # Group ownership is set by shoebox-ansible-setup.yaml (which runs as root);
    # we don't set it here because the ansible user isn't a member of gid 1001
    # and would hit chgrp permission errors without become.
    - name: Ensure upgrade state dir exists on controller
      ansible.builtin.file:
        path: "{{ state_dir }}"
        state: directory
        mode: '0775'
      delegate_to: localhost
      become: false
      run_once: true

    # Cleared here (agents = first play) so each full playbook run starts fresh.
    # A re-run with --limit multimasters or --limit masters skips this clear, so
    # the failure flag from a prior run still aborts subsequent plays. Operators
    # re-running just multimasters/masters after a partial failure must rm the
    # flag manually — see recovery section of ansible-scheduler.md.
    - name: Clear stale failure state from previous run
      ansible.builtin.file:
        path: "{{ state_dir }}/rolling-upgrade-failed"
        state: absent
      delegate_to: localhost
      become: false
      run_once: true

    - name: Signal maintenance in progress
      ansible.builtin.copy:
        content: "{{ ansible_date_time.iso8601 }}"
        dest: "{{ state_dir }}/maintenance-in-progress"
        mode: '0644'
      delegate_to: localhost
      become: false
      run_once: true

    - name: Verify k8s node name matches ansible_hostname
      kubernetes.core.k8s_info:
        kind: Node
        name: "{{ ansible_hostname }}"
      delegate_to: localhost
      become: false
      register: node_check
      failed_when: node_check.resources | length == 0
      changed_when: false

  tasks:
    - name: Upgrade node
      block:
        - name: Show current OS version
          ansible.builtin.command: lsb_release -ds
          register: os_version
          changed_when: false

        - name: Starting upgrade of {{ inventory_hostname }}
          ansible.builtin.debug:
            msg: "Starting upgrade of {{ inventory_hostname }} ({{ os_version.stdout }})"

        - name: Cordon node before drain
          kubernetes.core.k8s_drain:
            name: "{{ ansible_hostname }}"
            state: cordon
          delegate_to: localhost
          become: false

        - name: Drain node
          kubernetes.core.k8s_drain:
            name: "{{ ansible_hostname }}"
            state: drain
            ignore_daemonsets: true
            delete_options:
              deleteEmptyDirData: true
            grace_period: 30
            drain_timeout: 300
          delegate_to: localhost
          become: false

        - name: Ensure upgrade state dir exists on node
          ansible.builtin.file:
            path: "{{ state_dir }}"
            state: directory
            mode: '0755'

        - name: Record pre-upgrade package versions
          ansible.builtin.shell:
            cmd: dpkg-query -W -f='${Package}=${Version}\n' > {{ state_dir }}/pre-upgrade.txt
            executable: /bin/bash
          changed_when: false

        - name: Update apt cache
          ansible.builtin.apt:
            update_cache: true

        - name: Run dist-upgrade
          ansible.builtin.apt:
            upgrade: dist
            autoremove: true
            autoclean: true
            lock_timeout: 300
          register: apt_upgrade

        - name: Check if reboot is required
          ansible.builtin.stat:
            path: /var/run/reboot-required
          register: reboot_required_file

        - name: Reboot
          ansible.builtin.reboot:
            reboot_timeout: 600
            post_reboot_delay: 15
          when: reboot_required_file.stat.exists or apt_upgrade.changed

        - name: Refresh facts to pick up new kernel version
          ansible.builtin.setup:

        - name: Install linux-modules-extra for running kernel (required for iSCSI)
          ansible.builtin.apt:
            name: "linux-modules-extra-{{ ansible_kernel }}"
            state: present

        - name: Wait for k3s-agent to become active  # noqa: command-instead-of-module
          ansible.builtin.command: systemctl is-active k3s-agent
          register: k3s_status
          until: k3s_status.rc == 0
          retries: 30
          delay: 10
          changed_when: false

        - name: Uncordon node
          kubernetes.core.k8s_drain:
            name: "{{ ansible_hostname }}"
            state: uncordon
          delegate_to: localhost
          become: false

        - name: Verify node is Ready
          kubernetes.core.k8s_info:
            kind: Node
            name: "{{ ansible_hostname }}"
            wait: true
            wait_condition:
              type: Ready
              status: "True"
            wait_timeout: 120
          delegate_to: localhost
          become: false
          changed_when: false

        - name: Verify k3s not in restart loop  # noqa: command-instead-of-module
          ansible.builtin.command: "systemctl show {{ k3s_svc }} --property=NRestarts --value"
          register: post_restarts
          failed_when: post_restarts.stdout | int > 3
          changed_when: false

        - name: Show post-upgrade OS version
          ansible.builtin.command: lsb_release -ds
          register: os_version_after
          changed_when: false

        - name: Upgrade complete — {{ inventory_hostname }}
          ansible.builtin.debug:
            msg: "{{ inventory_hostname }} upgraded successfully: {{ os_version_after.stdout }}"

      rescue:
        - name: Record play failure for subsequent plays
          ansible.builtin.file:
            path: "{{ state_dir }}/rolling-upgrade-failed"
            state: touch
            mode: '0644'
          delegate_to: localhost
          become: false
          failed_when: false  # must not abort rescue — Pushover alert tasks below must still run

        - name: Attempt automatic node rebuild
          block:
            - name: Uninstall k3s agent
              ansible.builtin.shell:
                cmd: /usr/local/bin/k3s-agent-uninstall.sh
                executable: /bin/bash
              failed_when: false
              changed_when: true

            - name: Reinstall k3s agent  # noqa: command-instead-of-module
              ansible.builtin.shell:
                executable: /bin/bash
                cmd: |
                  set -o pipefail
                  curl -sfL https://get.k3s.io | sh -s - agent
              environment:
                K3S_URL: "{{ k3s_api_server_url }}"
                K3S_TOKEN: "{{ k3s_token }}"
              changed_when: true
              no_log: true

            - name: Wait for k3s-agent to become active after rebuild  # noqa: command-instead-of-module
              ansible.builtin.command: systemctl is-active k3s-agent
              register: k3s_rebuilt
              until: k3s_rebuilt.rc == 0
              retries: 30
              delay: 10
              changed_when: false

            - name: Wait for node to rejoin cluster after rebuild
              kubernetes.core.k8s_info:
                kind: Node
                name: "{{ ansible_hostname }}"
                wait: true
                wait_condition:
                  type: Ready
                  status: "True"
                wait_timeout: 180
              delegate_to: localhost
              become: false
              changed_when: false

            - name: Uncordon node after successful rebuild
              kubernetes.core.k8s_drain:
                name: "{{ ansible_hostname }}"
                state: uncordon
              delegate_to: localhost
              become: false

            - name: Clear failure flag — rebuild succeeded, safe to continue
              ansible.builtin.file:
                path: "{{ state_dir }}/rolling-upgrade-failed"
                state: absent
              delegate_to: localhost
              become: false

            - name: Alert WARNING — node auto-rebuilt and back in service
              ansible.builtin.uri:
                url: https://api.pushover.net/1/messages.json
                method: POST
                timeout: 10
                body_format: form-urlencoded
                body:
                  token: "{{ pushover_app_token }}"
                  user: "{{ pushover_user_key }}"
                  message: "WARNING: {{ inventory_hostname }} upgrade failed; auto-rebuilt, back in service."
                  priority: "1"
              delegate_to: localhost
              become: false
              no_log: true
              changed_when: false

          rescue:
            - name: Alert CRITICAL — upgrade and rebuild both failed
              ansible.builtin.uri:
                url: https://api.pushover.net/1/messages.json
                method: POST
                timeout: 10
                body_format: form-urlencoded
                body:
                  token: "{{ pushover_app_token }}"
                  user: "{{ pushover_user_key }}"
                  message: >-
                    CRITICAL: {{ inventory_hostname }} upgrade+rebuild failed
                    at task '{{ ansible_failed_task.name | default('unknown') }}'.
                    Node DRAINED. Manual fix required.
                  priority: "2"
                  retry: "300"
                  expire: "3600"
              delegate_to: localhost
              become: false
              no_log: true
              changed_when: false


- name: Rolling OS upgrade — multi-master servers
  hosts: "{{ target | default('multimasters') }}"
  become: true
  serial: 1
  any_errors_fatal: "{{ strict_mode | default(false) | bool }}"

  vars_files:
    - "{{ vault_file }}"

  vars:
    k3s_svc: k3s

  pre_tasks:
    - name: Check if a previous play failed
      ansible.builtin.stat:
        path: "{{ state_dir }}/rolling-upgrade-failed"
      delegate_to: localhost
      become: false
      register: prev_play_failed

    - name: Abort — previous play failed, not proceeding
      ansible.builtin.fail:
        msg: "A previous play left nodes in a failed state. Fix nodes and clear the flag, then re-run."
      become: false
      when:
        - strict_mode | default(false) | bool
        - prev_play_failed.stat.exists

    - name: Get control-plane node statuses for quorum check
      kubernetes.core.k8s_info:
        kind: Node
        label_selectors:
          - "node-role.kubernetes.io/control-plane"
      delegate_to: localhost
      become: false
      register: cp_nodes
      changed_when: false
      failed_when: cp_nodes.resources | length == 0

    - name: Verify all control-plane nodes Ready before draining
      ansible.builtin.fail:
        msg: "Control-plane node {{ item.metadata.name }} is not Ready or is cordoned — aborting."
      when: >-
        (item.status.conditions |
         selectattr('type', 'equalto', 'Ready') |
         selectattr('status', 'equalto', 'True') |
         list | length) == 0 or
        (item.spec.taints | default([]) |
         selectattr('key', 'equalto', 'node.kubernetes.io/unschedulable') |
         list | length) > 0
      loop: "{{ cp_nodes.resources }}"
      loop_control:
        label: "{{ item.metadata.name }}"

    - name: Verify k8s node name matches ansible_hostname
      kubernetes.core.k8s_info:
        kind: Node
        name: "{{ ansible_hostname }}"
      delegate_to: localhost
      become: false
      register: node_check
      failed_when: node_check.resources | length == 0
      changed_when: false

  tasks:
    - name: Upgrade node
      block:
        - name: Show current OS version
          ansible.builtin.command: lsb_release -ds
          register: os_version
          changed_when: false

        - name: Starting upgrade of {{ inventory_hostname }}
          ansible.builtin.debug:
            msg: "Starting upgrade of multi-master {{ inventory_hostname }} ({{ os_version.stdout }})"

        - name: Cordon node before drain
          kubernetes.core.k8s_drain:
            name: "{{ ansible_hostname }}"
            state: cordon
          delegate_to: localhost
          become: false

        - name: Drain node
          kubernetes.core.k8s_drain:
            name: "{{ ansible_hostname }}"
            state: drain
            ignore_daemonsets: true
            delete_options:
              deleteEmptyDirData: true
            grace_period: 60
            drain_timeout: 300
          delegate_to: localhost
          become: false

        - name: Ensure upgrade state dir exists on node
          ansible.builtin.file:
            path: "{{ state_dir }}"
            state: directory
            mode: '0755'

        - name: Record pre-upgrade package versions
          ansible.builtin.shell:
            cmd: dpkg-query -W -f='${Package}=${Version}\n' > {{ state_dir }}/pre-upgrade.txt
            executable: /bin/bash
          changed_when: false

        - name: Update apt cache
          ansible.builtin.apt:
            update_cache: true

        - name: Run dist-upgrade
          ansible.builtin.apt:
            upgrade: dist
            autoremove: true
            autoclean: true
            lock_timeout: 300
          register: apt_upgrade

        - name: Check if reboot is required
          ansible.builtin.stat:
            path: /var/run/reboot-required
          register: reboot_required_file

        - name: Reboot
          ansible.builtin.reboot:
            reboot_timeout: 600
            post_reboot_delay: 20
          when: reboot_required_file.stat.exists or apt_upgrade.changed

        - name: Refresh facts to pick up new kernel version
          ansible.builtin.setup:

        - name: Install linux-modules-extra for running kernel (required for iSCSI)
          ansible.builtin.apt:
            name: "linux-modules-extra-{{ ansible_kernel }}"
            state: present

        - name: Wait for k3s server to become active  # noqa: command-instead-of-module
          ansible.builtin.command: systemctl is-active k3s
          register: k3s_status
          until: k3s_status.rc == 0
          retries: 30
          delay: 10
          changed_when: false

        - name: Wait for node to rejoin cluster
          kubernetes.core.k8s_info:
            kind: Node
            name: "{{ ansible_hostname }}"
            wait: true
            wait_condition:
              type: Ready
              status: "True"
            wait_timeout: 180
          delegate_to: localhost
          become: false
          changed_when: false

        - name: Uncordon node
          kubernetes.core.k8s_drain:
            name: "{{ ansible_hostname }}"
            state: uncordon
          delegate_to: localhost
          become: false

        - name: Verify node is Ready after uncordon
          kubernetes.core.k8s_info:
            kind: Node
            name: "{{ ansible_hostname }}"
            wait: true
            wait_condition:
              type: Ready
              status: "True"
            wait_timeout: 60
          delegate_to: localhost
          become: false
          changed_when: false

        - name: Verify k3s not in restart loop  # noqa: command-instead-of-module
          ansible.builtin.command: "systemctl show {{ k3s_svc }} --property=NRestarts --value"
          register: post_restarts
          failed_when: post_restarts.stdout | int > 3
          changed_when: false

        - name: Show post-upgrade OS version
          ansible.builtin.command: lsb_release -ds
          register: os_version_after
          changed_when: false

        - name: Upgrade complete — {{ inventory_hostname }}
          ansible.builtin.debug:
            msg: "{{ inventory_hostname }} upgraded successfully: {{ os_version_after.stdout }}"

      rescue:
        - name: Record play failure for subsequent plays
          ansible.builtin.file:
            path: "{{ state_dir }}/rolling-upgrade-failed"
            state: touch
            mode: '0644'
          delegate_to: localhost
          become: false
          failed_when: false  # must not abort rescue — Pushover alert tasks below must still run

        - name: Alert CRITICAL — control-plane node upgrade failed
          ansible.builtin.uri:
            url: https://api.pushover.net/1/messages.json
            method: POST
            body_format: form-urlencoded
            body:
              token: "{{ pushover_app_token }}"
              user: "{{ pushover_user_key }}"
              message: >-
                CRITICAL: {{ inventory_hostname }} (master) upgrade failed
                at task '{{ ansible_failed_task.name | default('unknown') }}'.
                Node DRAINED. Manual fix required.
              priority: "2"
              retry: "300"
              expire: "3600"
          delegate_to: localhost
          become: false
          no_log: true
          changed_when: false


- name: Rolling OS upgrade — first master (last)
  hosts: "{{ target | default('masters') }}"
  become: true
  serial: 1
  any_errors_fatal: "{{ strict_mode | default(false) | bool }}"

  vars_files:
    - "{{ vault_file }}"

  vars:
    k3s_svc: k3s

  pre_tasks:
    - name: Check if a previous play failed
      ansible.builtin.stat:
        path: "{{ state_dir }}/rolling-upgrade-failed"
      delegate_to: localhost
      become: false
      register: prev_play_failed

    - name: Abort — previous play failed, not proceeding
      ansible.builtin.fail:
        msg: "A previous play left nodes in a failed state. Fix nodes and clear the flag, then re-run."
      become: false
      when:
        - strict_mode | default(false) | bool
        - prev_play_failed.stat.exists

    # Use cluster3 kubeconfig for all kubernetes.core pre-tasks — these must work even on
    # --limit masters re-runs when cluster1's API is already down.
    - name: Get control-plane node statuses for quorum check
      kubernetes.core.k8s_info:
        kind: Node
        label_selectors:
          - "node-role.kubernetes.io/control-plane"
        kubeconfig: /etc/ansible/kubeconfig-cluster3
      delegate_to: localhost
      become: false
      register: cp_nodes
      changed_when: false
      failed_when: cp_nodes.resources | length == 0

    - name: Verify all control-plane nodes Ready before draining
      ansible.builtin.fail:
        msg: "Control-plane node {{ item.metadata.name }} is not Ready or is cordoned — aborting."
      when: >-
        (item.status.conditions |
         selectattr('type', 'equalto', 'Ready') |
         selectattr('status', 'equalto', 'True') |
         list | length) == 0 or
        (item.spec.taints | default([]) |
         selectattr('key', 'equalto', 'node.kubernetes.io/unschedulable') |
         list | length) > 0
      loop: "{{ cp_nodes.resources }}"
      loop_control:
        label: "{{ item.metadata.name }}"

    - name: Verify k8s node name matches ansible_hostname
      kubernetes.core.k8s_info:
        kind: Node
        name: "{{ ansible_hostname }}"
        kubeconfig: /etc/ansible/kubeconfig-cluster3
      delegate_to: localhost
      become: false
      register: node_check
      failed_when: node_check.resources | length == 0
      changed_when: false

  tasks:
    - name: Upgrade node
      block:
        - name: Show current OS version
          ansible.builtin.command: lsb_release -ds
          register: os_version
          changed_when: false

        - name: Starting upgrade of {{ inventory_hostname }}
          ansible.builtin.debug:
            msg: >
              Starting upgrade of first-master {{ inventory_hostname }} ({{ os_version.stdout }}).
              Ensure kubectl is configured to reach the cluster via a VIP or
              another server in case this node's API server is briefly unavailable.

        - name: Cordon node before drain
          kubernetes.core.k8s_drain:
            name: "{{ ansible_hostname }}"
            state: cordon
          delegate_to: localhost
          become: false

        - name: Drain node
          kubernetes.core.k8s_drain:
            name: "{{ ansible_hostname }}"
            state: drain
            ignore_daemonsets: true
            delete_options:
              deleteEmptyDirData: true
            grace_period: 60
            drain_timeout: 300
          delegate_to: localhost
          become: false

        - name: Ensure upgrade state dir exists on node
          ansible.builtin.file:
            path: "{{ state_dir }}"
            state: directory
            mode: '0755'

        - name: Record pre-upgrade package versions
          ansible.builtin.shell:
            cmd: dpkg-query -W -f='${Package}=${Version}\n' > {{ state_dir }}/pre-upgrade.txt
            executable: /bin/bash
          changed_when: false

        - name: Update apt cache
          ansible.builtin.apt:
            update_cache: true

        - name: Run dist-upgrade
          ansible.builtin.apt:
            upgrade: dist
            autoremove: true
            autoclean: true
            lock_timeout: 300
          register: apt_upgrade

        - name: Check if reboot is required
          ansible.builtin.stat:
            path: /var/run/reboot-required
          register: reboot_required_file

        - name: Reboot
          ansible.builtin.reboot:
            reboot_timeout: 600
            post_reboot_delay: 30
          when: reboot_required_file.stat.exists or apt_upgrade.changed

        - name: Refresh facts to pick up new kernel version
          ansible.builtin.setup:

        - name: Install linux-modules-extra for running kernel (required for iSCSI)
          ansible.builtin.apt:
            name: "linux-modules-extra-{{ ansible_kernel }}"
            state: present

        - name: Wait for k3s server to become active  # noqa: command-instead-of-module
          ansible.builtin.command: systemctl is-active k3s
          register: k3s_status
          until: k3s_status.rc == 0
          retries: 36
          delay: 10
          changed_when: false

        # cluster1 API is down during reboot — use cluster3 kubeconfig for kubernetes.core tasks
        - name: Wait for node to rejoin cluster
          kubernetes.core.k8s_info:
            kind: Node
            name: "{{ ansible_hostname }}"
            wait: true
            wait_condition:
              type: Ready
              status: "True"
            wait_timeout: 300
            kubeconfig: /etc/ansible/kubeconfig-cluster3
          delegate_to: localhost
          become: false
          changed_when: false

        - name: Uncordon node
          kubernetes.core.k8s_drain:
            name: "{{ ansible_hostname }}"
            state: uncordon
            kubeconfig: /etc/ansible/kubeconfig-cluster3
          delegate_to: localhost
          become: false

        - name: Verify node is Ready after uncordon
          kubernetes.core.k8s_info:
            kind: Node
            name: "{{ ansible_hostname }}"
            wait: true
            wait_condition:
              type: Ready
              status: "True"
            wait_timeout: 60
            kubeconfig: /etc/ansible/kubeconfig-cluster3
          delegate_to: localhost
          become: false
          changed_when: false

        - name: Verify k3s not in restart loop  # noqa: command-instead-of-module
          ansible.builtin.command: "systemctl show {{ k3s_svc }} --property=NRestarts --value"
          register: post_restarts
          failed_when: post_restarts.stdout | int > 3
          changed_when: false

        - name: Get final cluster node status
          kubernetes.core.k8s_info:
            kind: Node
            kubeconfig: /etc/ansible/kubeconfig-cluster3
          delegate_to: localhost
          become: false
          changed_when: false
          register: final_nodes

        - name: Final cluster state
          ansible.builtin.debug:
            msg: "{{ item.metadata.name }}: {{ item.status.conditions | selectattr('type', 'equalto', 'Ready') | map(attribute='status') | first | default('Unknown') }}"
          loop: "{{ final_nodes.resources }}"
          loop_control:
            label: "{{ item.metadata.name }}"

      rescue:
        - name: Record play failure for subsequent plays
          ansible.builtin.file:
            path: "{{ state_dir }}/rolling-upgrade-failed"
            state: touch
            mode: '0644'
          delegate_to: localhost
          become: false
          failed_when: false  # must not abort rescue — Pushover alert tasks below must still run

        - name: Alert CRITICAL — control-plane node upgrade failed
          ansible.builtin.uri:
            url: https://api.pushover.net/1/messages.json
            method: POST
            body_format: form-urlencoded
            body:
              token: "{{ pushover_app_token }}"
              user: "{{ pushover_user_key }}"
              message: >-
                CRITICAL: {{ inventory_hostname }} (master) upgrade failed
                at task '{{ ansible_failed_task.name | default('unknown') }}'.
                Node DRAINED. Manual fix required.
              priority: "2"
              retry: "300"
              expire: "3600"
          delegate_to: localhost
          become: false
          no_log: true
          changed_when: false


- name: Cleanup — clear maintenance flag
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Clear maintenance flag
      ansible.builtin.file:
        path: "{{ state_dir }}/maintenance-in-progress"
