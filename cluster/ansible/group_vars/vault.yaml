---
# Secrets fetched from OpenBao at playbook runtime via community.hashi_vault.
#
# Prerequisites:
#   export VAULT_ADDR=http://shoebox.vert:8200
#   export VAULT_TOKEN=<ansible-read token>     # scoped token, not root
#
# Token setup: see cluster/openbao/README.md — "KV engine and initial secrets"
# Run deploy-openbao.yaml first to stand up the OpenBao service.
#
# Populate OpenBao before running playbooks:
#   bao kv put secret/k3s/cluster           token=<k3s-join-token>
#   bao kv put secret/cluster/pushover      app_token=<VALUE> user_key=<VALUE>
#   bao kv put secret/cluster/semaphore     admin_password=<VALUE> access_key_encryption=<VALUE>
#   bao kv put secret/cluster/ansible       vault_password=migrated-to-openbao
#
# Any secrets recently added to vault.yaml must also be migrated here as a
# lookup and populated in OpenBao before removing the old encrypted file.

k3s_token: "{{ lookup('community.hashi_vault.hashi_vault',
    'secret/k3s/cluster:token',
    auth_method='token',
    url=lookup('env', 'VAULT_ADDR'),
    token=lookup('env', 'VAULT_TOKEN')) }}"

pushover_app_token: "{{ lookup('community.hashi_vault.hashi_vault',
    'secret/cluster/pushover:app_token',
    auth_method='token',
    url=lookup('env', 'VAULT_ADDR'),
    token=lookup('env', 'VAULT_TOKEN')) }}"

pushover_user_key: "{{ lookup('community.hashi_vault.hashi_vault',
    'secret/cluster/pushover:user_key',
    auth_method='token',
    url=lookup('env', 'VAULT_ADDR'),
    token=lookup('env', 'VAULT_TOKEN')) }}"

semaphore_admin_password: "{{ lookup('community.hashi_vault.hashi_vault',
    'secret/cluster/semaphore:admin_password',
    auth_method='token',
    url=lookup('env', 'VAULT_ADDR'),
    token=lookup('env', 'VAULT_TOKEN')) }}"

semaphore_access_key_encryption: "{{ lookup('community.hashi_vault.hashi_vault',
    'secret/cluster/semaphore:access_key_encryption',
    auth_method='token',
    url=lookup('env', 'VAULT_ADDR'),
    token=lookup('env', 'VAULT_TOKEN')) }}"

# vault_password is retained for shoebox-ansible-setup.yaml which writes it to
# /etc/ansible/vault-password. The value is a sentinel since ansible-vault is
# no longer used for group_vars — but the file on shoebox must exist.
vault_password: "{{ lookup('community.hashi_vault.hashi_vault',
    'secret/cluster/ansible:vault_password',
    auth_method='token',
    url=lookup('env', 'VAULT_ADDR'),
    token=lookup('env', 'VAULT_TOKEN')) }}"
