---
# Prerequisite: node must already be reachable by its final hostname.
# To rename a node first, use rename-node.yaml.

- name: "Setup k3s node"
  hosts: all:!ubuntu
  become: true

  vars_files:
    - "{{ vault_file }}"

  tasks:
    # ── USB data disk (bootstrap-only: initial PARTUUID mount + fstab) ─────────
    - name: Get PARTUUID
      ansible.builtin.command: 'lsblk {{ usb_disk }} -no PARTUUID'
      register: partuuid
      when: usb_disk is defined
    - name: Mount USB disk and persist in fstab
      ansible.posix.mount:
        path: /mnt/usb
        src: 'PARTUUID={{ partuuid.stdout }}'
        fstype: ext4
        opts: noatime
        state: mounted
      when: usb_disk is defined

    # ── Converge OS state via the node_state role ──────────────────────────────
    # Covers: packages, kernel modules, sysctl, NTP, swap, journald, multipath,
    # iSCSI, k3s server config (control-plane only), memory drop-in, and USB
    # offload symlinks (k3s, longhorn, kubelet, pod logs).
    - name: Converge OS state
      ansible.builtin.include_role:
        name: node_state

    # ── Pre-installation reboot ────────────────────────────────────────────────
    - name: Pre-installation reboot
      ansible.builtin.reboot:

    # ── k3s installation ───────────────────────────────────────────────────────
    - name: Download k3s agent installer
      tags:
        - k3s
      ansible.builtin.get_url:
        url: https://get.k3s.io
        dest: /tmp/k3s-setup.sh
        mode: '0755'
    - name: Run k3s agent installer
      when: cluster_role == "agent"
      tags:
        - k3s
      ansible.builtin.command: /tmp/k3s-setup.sh
      environment:
        K3S_URL: "{{ k3s_api_server_url }}"
        K3S_TOKEN: "{{ k3s_token }}"
    - name: Run k3s multi-master installer
      when: cluster_role == "multi-master"
      tags:
        - k3s
      ansible.builtin.command: /tmp/k3s-setup.sh
      environment:
        K3S_URL: "{{ k3s_api_server_url }}"
        K3S_TOKEN: "{{ k3s_token }}"
        INSTALL_K3S_EXEC: "server --server {{ k3s_api_server_url }} --disable=servicelb"
    # first-master is cluster genesis only (--cluster-init, no --server): it founds
    # etcd, so it has no VIP to join. To REBUILD cluster1 against a live cluster,
    # run it with cluster_role=multi-master so it rejoins via the VIP — never re-run
    # this first-master path against an existing cluster (it would re-init etcd).
    - name: Run k3s first master installer
      when: cluster_role == "first-master"
      tags:
        - k3s
      ansible.builtin.command: /tmp/k3s-setup.sh
      environment:
        K3S_TOKEN: "{{ k3s_token }}"
        INSTALL_K3S_EXEC: "server --cluster-init --disable=servicelb"
