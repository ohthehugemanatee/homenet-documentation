---
# Rolling OS major release upgrade for k3s nodes.
# Generally it's recommended to re-image rather than upgrade major versions,
# but that would mean going _all the way_ to the other room to pull the sd card.
#
# Drains each node, runs apt dist-upgrade, reboots, runs do-release-upgrade, uncordons, verifies Ready.
# Safe to re-run — skips reboot if /var/run/reboot-required is absent and
# no packages were upgraded.
#
# Prerequisites:
#   - kubernetes.core collection installed; kubernetes Python library available
#   - ansible-playbook run from a machine with kubectl access
#
# Usage:
#   All nodes (rolling):  ansible-playbook -i inventory.yaml --vault-password-file /etc/ansible/vault-password \
#                           -e vault_file=group_vars/vault.yaml rolling-release-upgrade.yaml
#   Single node:          ansible-playbook -i inventory.yaml --vault-password-file /etc/ansible/vault-password \
#                           -e vault_file=group_vars/vault.yaml --limit cluster1 rolling-release-upgrade.yaml
#
# Node ordering: agents first, then multimasters, then masters (first-master last).
# Override with --limit or -e target=<group>.
#
# strict_mode=true (strongly recommended):
#   - Stops on first node failure (any_errors_fatal)
#   - Aborts subsequent plays if a prior play left nodes failed/drained
#
# WARNING: draining a k3s server node evicts non-system pods but leaves the
# control plane processes running. HA clusters (3 servers) tolerate this fine.
# Do NOT run this against all 3 servers simultaneously — serial: 1 prevents that.
#
# BEFORE RUNNING: scale down strict-local StatefulSets to avoid drain timeouts:
#   kubectl scale statefulset plex --replicas=0
#   kubectl scale statefulset nextcloud --replicas=0
# Scale back up after each node is verified Ready.

- name: "Rolling OS release upgrade: agents"
  hosts: "{{ target | default('agents:!ubuntu') }}"
  become: true
  serial: 1
  any_errors_fatal: "{{ strict_mode | default(false) | bool }}"

  vars_files:
    - "{{ vault_file }}"

  vars:
    k3s_svc: k3s-agent
    k8s_kubeconfig: "{{ lookup('env', 'KUBECONFIG') or (lookup('env', 'HOME') + '/.kube/config') }}"

  pre_tasks:
    - name: Initialize upgrade state and verify node
      ansible.builtin.import_role:
        name: upgrade_pre_state

  tasks:
    - name: Upgrade node
      block:
        - name: Show current OS version
          ansible.builtin.command: lsb_release -ds
          register: os_version
          changed_when: false

        - name: Starting upgrade of {{ inventory_hostname }}
          ansible.builtin.debug:
            msg: "Starting upgrade of {{ inventory_hostname }} ({{ os_version.stdout }})"

        - name: Cordon and drain node
          ansible.builtin.import_role:
            name: cordon_drain

        - name: Run apt dist-upgrade and reboot
          ansible.builtin.import_role:
            name: apt_upgrade

        - name: Run do-release-upgrade
          ansible.builtin.import_role:
            name: release_upgrade

        - name: Verify k3s health and uncordon
          ansible.builtin.import_role:
            name: k3s_health

        - name: Show post-upgrade OS version
          ansible.builtin.command: lsb_release -ds
          register: os_version_after
          changed_when: false

        - name: Upgrade complete — {{ inventory_hostname }}
          ansible.builtin.debug:
            msg: "{{ inventory_hostname }} upgraded successfully: {{ os_version_after.stdout }}"

      rescue:
        - name: Attempt agent rebuild on failure
          ansible.builtin.import_role:
            name: upgrade_rescue_agent


- name: "Rolling OS release upgrade: multi-master servers"
  hosts: "{{ target | default('multimasters') }}"
  become: true
  serial: 1
  any_errors_fatal: "{{ strict_mode | default(false) | bool }}"

  vars_files:
    - "{{ vault_file }}"

  vars:
    k3s_svc: k3s
    k8s_kubeconfig: "{{ lookup('env', 'KUBECONFIG') or (lookup('env', 'HOME') + '/.kube/config') }}"
    cordon_drain_grace_period: 60
    apt_upgrade_post_reboot_delay: 20
    k3s_health_wait_before_uncordon: true
    k3s_health_node_ready_timeout: 180

  pre_tasks:
    - name: Check prior-play failures and CP quorum
      ansible.builtin.import_role:
        name: upgrade_checks_cp

  tasks:
    - name: Upgrade node
      block:
        - name: Show current OS version
          ansible.builtin.command: lsb_release -ds
          register: os_version
          changed_when: false

        - name: Starting upgrade of {{ inventory_hostname }}
          ansible.builtin.debug:
            msg: "Starting upgrade of multi-master {{ inventory_hostname }} ({{ os_version.stdout }})"

        - name: Cordon and drain node
          ansible.builtin.import_role:
            name: cordon_drain

        - name: Run apt dist-upgrade and reboot
          ansible.builtin.import_role:
            name: apt_upgrade

        - name: Run do-release-upgrade
          ansible.builtin.import_role:
            name: release_upgrade

        - name: Verify k3s health and uncordon
          ansible.builtin.import_role:
            name: k3s_health

        - name: Show post-upgrade OS version
          ansible.builtin.command: lsb_release -ds
          register: os_version_after
          changed_when: false

        - name: Upgrade complete — {{ inventory_hostname }}
          ansible.builtin.debug:
            msg: "{{ inventory_hostname }} upgraded successfully: {{ os_version_after.stdout }}"

      rescue:
        - name: Alert and record CP upgrade failure
          ansible.builtin.import_role:
            name: upgrade_rescue_cp


- name: "Rolling OS release upgrade: first master (last)"
  hosts: "{{ target | default('masters') }}"
  become: true
  serial: 1
  any_errors_fatal: "{{ strict_mode | default(false) | bool }}"

  vars_files:
    - "{{ vault_file }}"

  vars:
    k3s_svc: k3s
    k8s_kubeconfig: /etc/ansible/kubeconfig-cluster3
    cordon_drain_grace_period: 60
    apt_upgrade_post_reboot_delay: 30
    k3s_health_wait_before_uncordon: true
    k3s_health_wait_retries: 36
    k3s_health_node_ready_timeout: 300

  pre_tasks:
    - name: Check prior-play failures and CP quorum
      ansible.builtin.import_role:
        name: upgrade_checks_cp

  tasks:
    - name: Upgrade node
      block:
        - name: Show current OS version
          ansible.builtin.command: lsb_release -ds
          register: os_version
          changed_when: false

        - name: Starting upgrade of {{ inventory_hostname }}
          ansible.builtin.debug:
            msg: >
              Starting upgrade of first-master {{ inventory_hostname }} ({{ os_version.stdout }}).
              Ensure kubectl is configured to reach the cluster via a VIP or
              another server in case this node's API server is briefly unavailable.

        - name: Cordon and drain node
          ansible.builtin.import_role:
            name: cordon_drain

        - name: Run apt dist-upgrade and reboot
          ansible.builtin.import_role:
            name: apt_upgrade

        - name: Run do-release-upgrade
          ansible.builtin.import_role:
            name: release_upgrade

        - name: Verify k3s health and uncordon
          ansible.builtin.import_role:
            name: k3s_health

        - name: Get final cluster node status
          kubernetes.core.k8s_info:
            kind: Node
            kubeconfig: /etc/ansible/kubeconfig-cluster3
          delegate_to: localhost
          become: false
          changed_when: false
          register: final_nodes

        - name: Final cluster state
          ansible.builtin.debug:
            msg: >-
              {{ item.metadata.name }}: {{ item.status.conditions |
              selectattr('type', 'equalto', 'Ready') |
              map(attribute='status') | first | default('Unknown') }}
          loop: "{{ final_nodes.resources }}"
          loop_control:
            label: "{{ item.metadata.name }}"

        - name: Show post-upgrade OS version
          ansible.builtin.command: lsb_release -ds
          register: os_version_after
          changed_when: false

        - name: Upgrade complete — {{ inventory_hostname }}
          ansible.builtin.debug:
            msg: "{{ inventory_hostname }} upgraded successfully: {{ os_version_after.stdout }}"

      rescue:
        - name: Alert and record CP upgrade failure
          ansible.builtin.import_role:
            name: upgrade_rescue_cp


- name: Cleanup — clear maintenance flag
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Clear maintenance flag
      ansible.builtin.file:
        path: "{{ state_dir }}/maintenance-in-progress"
        state: absent
