---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yaml

driver:
  name: docker

platforms:
  - name: node-state-test
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command: /lib/systemd/systemd
    capabilities:
      - SYS_ADMIN

provisioner:
  name: ansible
  playbooks:
    converge: converge.yml
    verify: verify.yml
  extra_vars:
    # Point to plaintext dummy secrets so no vault password is needed in CI.
    # The real vault (group_vars/vault.yaml) is only decrypted on production runs.
    vault_file: "tests/monkeyble/test_secrets.yml"
  inventory:
    group_vars:
      all:
        cluster_role: agent
        ansible_user: root
        ntp_servers:
          - ntp.ubuntu.com
          - 0.pool.ntp.org
          - 1.pool.ntp.org

verifier:
  name: ansible
