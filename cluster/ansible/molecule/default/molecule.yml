---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yaml

driver:
  name: docker

platforms:
  # Agent node — must NOT get the control-plane taint config or the kube-vip
  # manifest (verifies the master-gated tasks are correctly no-ops on agents).
  - name: node-state-test
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command: /lib/systemd/systemd
    capabilities:
      - SYS_ADMIN
  # Control-plane node — exercises the multi-master path: k3s server config
  # (control-plane taint) and the kube_vip auto-deploy manifest placement.
  - name: node-state-master-test
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command: /lib/systemd/systemd
    capabilities:
      - SYS_ADMIN

provisioner:
  name: ansible
  config_options:
    defaults:
      remote_tmp: /tmp/.ansible/tmp
      pipelining: true
  options:
    skip-tags: molecule-notest
  playbooks:
    converge: converge.yml
    prepare: prepare.yml
    verify: verify.yml
  inventory:
    group_vars:
      all:
        ansible_user: root
        ntp_servers:
          - ntp.ubuntu.com
          - 0.pool.ntp.org
          - 1.pool.ntp.org
    host_vars:
      node-state-test:
        cluster_role: agent
      node-state-master-test:
        cluster_role: multi-master
        # Exercise the low-RAM control-plane hardening on the master path.
        node_state_zram_enabled: true
        node_state_sd_offload_enabled: true

verifier:
  name: ansible
