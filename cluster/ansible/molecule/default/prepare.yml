---
# Wait for systemd to fully initialize in the container before converge runs.
# geerlingguy/docker-ubuntu2204-ansible starts systemd as PID 1; in GitHub
# Actions the container is "running" before systemd has finished mounting /tmp,
# causing Ansible's temp-dir bootstrap to fail on converge.
- name: Wait for container systemd initialization
  hosts: localhost
  gather_facts: false
  connection: local
  tasks:
    - name: Pause for systemd to finish mounting /tmp
      ansible.builtin.pause:
        seconds: 20

# Stand in for the real USB data disk so the SD-offload symlink tasks (which
# only act when /mnt/usb is a mountpoint) are actually exercised under test.
- name: Provide a mounted /mnt/usb for the SD-offload path
  hosts: node-state-master-test
  gather_facts: false
  tasks:
    - name: Mount a tmpfs at /mnt/usb
      ansible.posix.mount:
        path: /mnt/usb
        src: tmpfs
        fstype: tmpfs
        opts: nodev,nosuid
        state: mounted
