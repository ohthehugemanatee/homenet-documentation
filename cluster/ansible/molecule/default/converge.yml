---
# Converge: run node-state.yaml against the Molecule Docker container.
# Templates resolve relative to node-state.yaml's location (../../templates/).
# The platform runs as cluster_role=multi-master (see molecule.yml) so this
# also exercises the kube_vip role's master path — verify.yml asserts the
# control-plane manifest lands in k3s's auto-deploy dir.
- name: Converge
  import_playbook: ../../node-state.yaml
