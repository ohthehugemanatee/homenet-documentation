---
- name: Verify node-state converge
  hosts: all
  gather_facts: true

  tasks:
    - name: Collect package facts
      ansible.builtin.package_facts:
        manager: apt

    - name: Assert base packages are installed
      ansible.builtin.assert:
        that:
          - "'nfs-common' in ansible_facts.packages"
          - "'vim' in ansible_facts.packages"
          - "'open-iscsi' in ansible_facts.packages"
          - "'unattended-upgrades' in ansible_facts.packages"
          - "'apt-listchanges' in ansible_facts.packages"
        fail_msg: "One or more base packages missing"

    - name: Stat k3s modules-load config
      ansible.builtin.stat:
        path: /etc/modules-load.d/k3s.conf
      register: modules_conf

    - name: Assert modules-load config exists
      ansible.builtin.assert:
        that: modules_conf.stat.exists

    - name: Read modules-load config
      ansible.builtin.slurp:
        src: /etc/modules-load.d/k3s.conf
      register: modules_content

    - name: Assert modules-load config contains k3s modules
      ansible.builtin.assert:
        that:
          - "'br_netfilter' in (modules_content.content | b64decode)"
          - "'overlay' in (modules_content.content | b64decode)"

    - name: Stat sysctl config
      ansible.builtin.stat:
        path: /etc/sysctl.d/99-k3s.conf
      register: sysctl_conf

    - name: Assert sysctl config exists
      ansible.builtin.assert:
        that: sysctl_conf.stat.exists

    - name: Read sysctl config
      ansible.builtin.slurp:
        src: /etc/sysctl.d/99-k3s.conf
      register: sysctl_content

    - name: Assert required sysctl params present
      ansible.builtin.assert:
        that:
          - "'net.ipv4.ip_forward = 1' in (sysctl_content.content | b64decode)"
          - "'net.bridge.bridge-nf-call-iptables = 1' in (sysctl_content.content | b64decode)"

    - name: Stat NFS mount options config
      ansible.builtin.stat:
        path: /etc/nfsmount.conf
      register: nfsmount_conf

    - name: Assert NFS mount options config exists
      ansible.builtin.assert:
        that: nfsmount_conf.stat.exists

    - name: Read NFS mount options config
      ansible.builtin.slurp:
        src: /etc/nfsmount.conf
      register: nfsmount_content

    - name: Assert NFS soft mounts configured
      ansible.builtin.assert:
        that: "'Soft=True' in (nfsmount_content.content | b64decode)"

    - name: Read timesyncd config
      ansible.builtin.slurp:
        src: /etc/systemd/timesyncd.conf
      register: timesyncd_content

    - name: Assert NTP configured in timesyncd
      ansible.builtin.assert:
        that: "'ntp.ubuntu.com' in (timesyncd_content.content | b64decode)"

    - name: Stat unattended-upgrades config
      ansible.builtin.stat:
        path: /etc/apt/apt.conf.d/50unattended-upgrades
      register: unattended_conf

    - name: Assert unattended-upgrades config exists
      ansible.builtin.assert:
        that: unattended_conf.stat.exists

    - name: Stat auto-upgrades config
      ansible.builtin.stat:
        path: /etc/apt/apt.conf.d/20auto-upgrades
      register: auto_upgrades_conf

    - name: Assert auto-upgrades config exists
      ansible.builtin.assert:
        that: auto_upgrades_conf.stat.exists

    - name: Check fstab has no active swap entries
      ansible.builtin.shell:
        cmd: grep -cE '^[^#].*\sswap\s' /etc/fstab || true
        executable: /bin/bash
      register: active_swap_lines
      changed_when: false

    - name: Assert no active swap in fstab
      ansible.builtin.assert:
        that: active_swap_lines.stdout | int == 0
        fail_msg: "fstab still contains active swap entries"

    - name: Check journald volatile storage setting
      ansible.builtin.command: grep '^Storage=volatile' /etc/systemd/journald.conf
      register: journald_volatile
      changed_when: false
      failed_when: journald_volatile.rc > 1

    - name: Assert journald uses volatile storage
      ansible.builtin.assert:
        that: journald_volatile.rc == 0
        fail_msg: "journald not configured for volatile storage"

    - name: Check /etc/hosts contains loopback hostname entry
      ansible.builtin.command: grep '127.0.1.1' /etc/hosts
      register: hosts_loopback
      changed_when: false

    - name: Assert loopback hostname entry present
      ansible.builtin.assert:
        that: hosts_loopback.rc == 0

    - name: Stat k3s-agent unit file
      ansible.builtin.stat:
        path: /etc/systemd/system/k3s-agent.service
      register: k3s_unit

    - name: Assert k3s not installed (expected in Docker) — play handled gracefully
      ansible.builtin.assert:
        that: not k3s_unit.stat.exists
        success_msg: "k3s-agent service absent — node-state gracefully skipped k3s tasks"

    # ── k3s server config (control-plane taint) — role-dependent ──────────────
    # agent host gets no config.yaml; multi-master host does. Both hosts run the
    # same converge; assertions below scope by cluster_role (set per-host in
    # molecule.yml host_vars).

    - name: Stat k3s server config
      ansible.builtin.stat:
        path: /etc/rancher/k3s/config.yaml
      register: k3s_config

    - name: Assert k3s server config absent for agent role
      ansible.builtin.assert:
        that: not k3s_config.stat.exists
        success_msg: "k3s config.yaml correctly absent — agent nodes do not get control-plane taint"
      when: cluster_role == 'agent'

    - name: Assert k3s server config present for control-plane role
      ansible.builtin.assert:
        that: k3s_config.stat.exists
        fail_msg: "k3s config.yaml missing — control-plane nodes must get the taint config"
      when: cluster_role in ['first-master', 'multi-master']

    - name: Read k3s server config
      ansible.builtin.slurp:
        src: /etc/rancher/k3s/config.yaml
      register: k3s_config_content
      when: cluster_role in ['first-master', 'multi-master']

    - name: Assert k3s server config lists the control-plane VIP as a tls-san
      ansible.builtin.assert:
        that:
          - "'tls-san' in (k3s_config_content.content | b64decode)"
          - "'10.10.10.9' in (k3s_config_content.content | b64decode)"
        fail_msg: "config.yaml missing tls-san for the VIP — apiserver cert will not be valid for 10.10.10.9"
      when: cluster_role in ['first-master', 'multi-master']

    # ── Memory headroom: kubelet reserve/evict args (control-plane) ───────────

    - name: Assert k3s config sets memory reserve + eviction kubelet args
      ansible.builtin.assert:
        that:
          - "'kubelet-arg' in (k3s_config_content.content | b64decode)"
          - "'system-reserved=cpu=250m,memory=512Mi' in (k3s_config_content.content | b64decode)"
          - "'kube-reserved=memory=512Mi' in (k3s_config_content.content | b64decode)"
          - "'eviction-hard=memory.available<300Mi' in (k3s_config_content.content | b64decode)"
          - "'eviction-minimum-reclaim=memory.available=100Mi' in (k3s_config_content.content | b64decode)"
        fail_msg: "config.yaml missing kubelet memory reserve/eviction args — control plane has no OOM headroom"
      when: cluster_role in ['first-master', 'multi-master']

    - name: Assert k3s config tolerates swap when zram is enabled
      ansible.builtin.assert:
        that: "'fail-swap-on=false' in (k3s_config_content.content | b64decode)"
        fail_msg: "zram enabled but kubelet still has fail-swap-on=true — k3s will refuse to start"
      when:
        - cluster_role in ['first-master', 'multi-master']
        - node_state_zram_enabled | default(false) | bool

    # ── Memory headroom: k3s MemoryHigh systemd drop-in (control-plane) ───────

    - name: Stat k3s MemoryHigh systemd drop-in
      ansible.builtin.stat:
        path: /etc/systemd/system/k3s.service.d/memory.conf
      register: k3s_memory_dropin

    - name: Assert MemoryHigh drop-in absent for agent role
      ansible.builtin.assert:
        that: not k3s_memory_dropin.stat.exists
        success_msg: "k3s MemoryHigh drop-in correctly absent on agent nodes"
      when: cluster_role == 'agent'

    - name: Assert MemoryHigh drop-in present and soft-capping the control plane
      ansible.builtin.assert:
        that: k3s_memory_dropin.stat.exists
        fail_msg: "k3s MemoryHigh systemd drop-in missing on a control-plane node"
      when: cluster_role in ['first-master', 'multi-master']

    - name: Read k3s MemoryHigh drop-in
      ansible.builtin.slurp:
        src: /etc/systemd/system/k3s.service.d/memory.conf
      register: k3s_memory_dropin_content
      when: cluster_role in ['first-master', 'multi-master']

    - name: Assert drop-in sets MemoryHigh and not a hard MemoryMax
      ansible.builtin.assert:
        that:
          - "'MemoryHigh=3G' in (k3s_memory_dropin_content.content | b64decode)"
          - "'MemoryMax=' not in (k3s_memory_dropin_content.content | b64decode)"
        fail_msg: "drop-in must set a soft MemoryHigh, never a hard MemoryMax (would OOM-kill the control plane)"
      when: cluster_role in ['first-master', 'multi-master']

    # ── zram compressed-RAM swap cushion (opt-in) ─────────────────────────────

    - name: Stat zramswap config
      ansible.builtin.stat:
        path: /etc/default/zramswap
      register: zramswap_conf

    - name: Assert zramswap config absent when zram disabled
      ansible.builtin.assert:
        that: not zramswap_conf.stat.exists
        success_msg: "zramswap config correctly absent when zram is disabled"
      when: not (node_state_zram_enabled | default(false) | bool)

    - name: Assert zramswap config present and tuned when zram enabled
      ansible.builtin.assert:
        that: zramswap_conf.stat.exists
        fail_msg: "zram enabled but /etc/default/zramswap was not written"
      when: node_state_zram_enabled | default(false) | bool

    - name: Read zramswap config
      ansible.builtin.slurp:
        src: /etc/default/zramswap
      register: zramswap_content
      when: node_state_zram_enabled | default(false) | bool

    - name: Assert zramswap config carries the algorithm + percent
      ansible.builtin.assert:
        that:
          - "'ALGO=zstd' in (zramswap_content.content | b64decode)"
          - "'PERCENT=50' in (zramswap_content.content | b64decode)"
        fail_msg: "zramswap config missing ALGO/PERCENT tuning"
      when: node_state_zram_enabled | default(false) | bool

    # ── USB offload: all data paths symlinked onto /mnt/usb ─────────────────────

    - name: Stat USB-offload paths
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /var/lib/rancher/k3s
        - /var/lib/rancher/longhorn
        - /var/lib/kubelet
        - /var/log/pods
      register: usb_offload_paths

    - name: Assert USB-offload paths untouched when offload disabled
      ansible.builtin.assert:
        that: not (item.stat.exists and item.stat.islnk)
        success_msg: "{{ item.item }} not symlinked — correct when USB-offload disabled"
      loop: "{{ usb_offload_paths.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: not (node_state_usb_offload_enabled | default(false) | bool)

    - name: Assert data paths are symlinked onto /mnt/usb
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.islnk
          - item.stat.lnk_target is match('/mnt/usb/.*')
        fail_msg: "{{ item.item }} is not a symlink onto /mnt/usb — USB-offload did not apply"
      loop: "{{ usb_offload_paths.results }}"
      loop_control:
        label: "{{ item.item }} -> {{ item.stat.lnk_target | default('?') }}"
      when: node_state_usb_offload_enabled | default(false) | bool

    # ── kube_vip role (master path; no-op on agents) ──────────────────────────

    - name: Stat kube-vip auto-deploy manifest
      ansible.builtin.stat:
        path: /var/lib/rancher/k3s/server/manifests/kube-vip.yaml
      register: kube_vip_manifest

    - name: Assert kube-vip manifest absent for agent role
      ansible.builtin.assert:
        that: not kube_vip_manifest.stat.exists
        success_msg: "kube-vip manifest correctly absent on agent nodes"
      when: cluster_role == 'agent'

    - name: Assert kube-vip manifest placed in k3s auto-deploy dir
      ansible.builtin.assert:
        that: kube_vip_manifest.stat.exists
        fail_msg: "kube_vip role did not place the manifest on a master"
      when: cluster_role in ['first-master', 'multi-master']

    - name: Read kube-vip manifest
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/manifests/kube-vip.yaml
      register: kube_vip_content
      when: cluster_role in ['first-master', 'multi-master']

    - name: Assert kube-vip manifest targets the control-plane VIP
      ansible.builtin.assert:
        that: "'10.10.10.9' in (kube_vip_content.content | b64decode)"
        fail_msg: "placed manifest does not reference the VIP 10.10.10.9"
      when: cluster_role in ['first-master', 'multi-master']
