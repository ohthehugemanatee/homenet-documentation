apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: system-upgrade-controller
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-out-of-sync.pushover: ""
spec:
  project: default
  source:
    repoURL: https://github.com/ohthehugemanatee/homenet-documentation.git
    targetRevision: HEAD
    path: cluster/operators/system-upgrade
    directory:
      include: system-upgrade-controller.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: system-upgrade
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
