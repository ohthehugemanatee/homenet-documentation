apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: collabora
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-sync-status-unknown.pushover: ""
spec:
  project: default
  source:
    repoURL: https://github.com/ohthehugemanatee/homenet-documentation.git
    targetRevision: HEAD
    path: cluster/helm/collabora
  destination:
    server: https://kubernetes.default.svc
    namespace: collabora
