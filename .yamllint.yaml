extends: default
ignore: |
  cluster/services/cert-manager.yaml
rules:
  line-length:
    max: 160
    level: warning
  truthy:
    allowed-values: ['true', 'false', 'yes', 'no', 'on', 'off']
    level: warning
  document-start: disable
  comments:
    min-spaces-from-content: 1
  indentation:
    spaces: 2
    indent-sequences: whatever
    check-multi-line-strings: false
  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 1
