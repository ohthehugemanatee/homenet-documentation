name: Cluster smoke tests

'on':
  push:
  pull_request:

jobs:

  dry-run:
    name: k3d dry-run
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install k3d
        env:
          K3D_VERSION: v5.7.5
        run: |
          curl -fsSLo /tmp/k3d \
            "https://github.com/k3d-io/k3d/releases/download/${K3D_VERSION}/k3d-linux-amd64"
          install -m 755 /tmp/k3d /usr/local/bin/k3d
          k3d version

      - name: Create k3d cluster
        run: k3d cluster create ci --wait --no-lb

      - name: Install cert-manager CRDs via helm
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --set crds.enabled=true \
            --wait

      - name: Wait for cert-manager webhook
        run: |
          kubectl rollout status deployment/cert-manager-webhook \
            -n cert-manager --timeout=120s

      - name: Seed cluster state (namespaces, priority classes)
        run: |
          for ns in argocd collabora unifi octoprint monitoring longhorn-system dns-bg-check; do
            kubectl create namespace "$ns" --dry-run=client -o yaml | kubectl apply -f -
          done
          kubectl apply -f cluster/priorityClasses/

      - name: Apply and verify claude-remote-debug RBAC (read-only auth matrix)
        run: |
          kubectl apply -f cluster/services/claude-remote-debug-rbac.yaml
          SA=system:serviceaccount:default:claude-remote-debug
          test "$(kubectl auth can-i list pods --as="$SA")" = yes
          test "$(kubectl auth can-i get pods/log --as="$SA")" = yes
          test "$(kubectl auth can-i list events --as="$SA" -A)" = yes
          test "$(kubectl auth can-i get secrets --as="$SA" -A)" = no
          test "$(kubectl auth can-i create pods/exec --as="$SA")" = no
          test "$(kubectl auth can-i delete pods --as="$SA")" = no
          echo "claude-remote-debug auth matrix OK"

      - name: Install kubernetes-mcp-server (real, read-only smoke test)
        run: |
          helm upgrade --install kubernetes-mcp-server \
            oci://ghcr.io/containers/charts/kubernetes-mcp-server --version 0.1.0 \
            --namespace default \
            -f cluster/helm/kubernetes-mcp-server/values.yaml \
            --wait --timeout 90s

      - name: Verify kubernetes-mcp-server rollout
        run: |
          kubectl wait --for=condition=Ready pod \
            -l app.kubernetes.io/name=kubernetes-mcp-server \
            -n default --timeout=90s

      - name: Verify kubernetes-mcp-server is read-only (no destructive tools registered)
        run: |
          kubectl -n default port-forward svc/kubernetes-mcp-server 8080:8080 &
          PF_PID=$!
          trap 'kill $PF_PID' EXIT
          for i in $(seq 1 10); do
            curl -fsS http://127.0.0.1:8080/healthz >/dev/null 2>&1 && break
            sleep 1
          done

          INIT_PAYLOAD='{"jsonrpc":"2.0","id":1,"method":"initialize",'
          INIT_PAYLOAD+='"params":{"protocolVersion":"2025-06-18","capabilities":{},'
          INIT_PAYLOAD+='"clientInfo":{"name":"test-cluster-ci","version":"0.0.0"}}}'

          INIT_HEADERS=$(mktemp)
          INIT_BODY=$(curl -sS -D "$INIT_HEADERS" -X POST http://127.0.0.1:8080/mcp \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json, text/event-stream' \
            -d "$INIT_PAYLOAD")
          echo "== initialize response headers =="; cat "$INIT_HEADERS"
          echo "== initialize response body =="; echo "$INIT_BODY"
          echo "$INIT_BODY" | grep -q '"protocolVersion"' \
            || { echo "FAILED: initialize did not return protocolVersion"; exit 1; }

          # Streamable-HTTP transport: the server may assign a session that
          # subsequent requests must echo back via this header.
          SESSION_ID=$(grep -i '^Mcp-Session-Id:' "$INIT_HEADERS" | tr -d '\r' | cut -d' ' -f2-)
          SESSION_HEADER=()
          [ -n "$SESSION_ID" ] && SESSION_HEADER=(-H "Mcp-Session-Id: $SESSION_ID")

          # Spec requires this notification before further requests on a
          # freshly initialized session; harmless to send even if unused.
          curl -sS -X POST http://127.0.0.1:8080/mcp \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json, text/event-stream' \
            "${SESSION_HEADER[@]}" \
            -d '{"jsonrpc":"2.0","method":"notifications/initialized","params":{}}' >/dev/null

          TOOLS_BODY=$(curl -sS -X POST http://127.0.0.1:8080/mcp \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json, text/event-stream' \
            "${SESSION_HEADER[@]}" \
            -d '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}')
          echo "== tools/list response body =="; echo "$TOOLS_BODY"
          echo "$TOOLS_BODY" | grep -q '"pods_list"' \
            || { echo "FAILED: pods_list not found in tools/list response"; exit 1; }

          # Primary check: no tool the server itself marks destructive.
          # Belt-and-suspenders: also reject the known exec tool by name, in
          # case a future upstream version omits the annotation.
          if echo "$TOOLS_BODY" | grep -q '"destructiveHint":[[:space:]]*true'; then
            echo "FAILED: a tool with destructiveHint:true is registered despite --read-only"
            exit 1
          fi
          if echo "$TOOLS_BODY" | grep -q '"pods_exec"'; then
            echo "FAILED: pods_exec is registered despite --read-only"
            exit 1
          fi
          echo "kubernetes-mcp-server read-only tool surface OK"

      - name: Server-side dry-run — all manifests
        run: |
          FAILED=0
          while IFS= read -r f; do
            echo "==> $f"
            kubectl apply --dry-run=server -f "$f" || { echo "FAILED: $f"; FAILED=1; }
          done < <(find cluster -name "*.yaml" \
            ! -path "*/ansible/*" \
            ! -path "*/helm/*" \
            ! -path "*/localdev/*" \
            ! -path "*/argocd/*" \
            ! -path "*/operators/*" \
            ! -path "*/priorityClasses/*" \
            ! -name "cert-manager.yaml" \
            ! -name "l2-config.yaml" \
            ! -name "traefik-default-tls.yaml" \
            ! -name "elasticsearch.yaml" \
            ! -name "probe-alerts.yaml" \
            | sort)
          exit "$FAILED"

      - name: Validate embedded Grafana dashboard JSON
        run: |
          python3 - <<'PY'
          import glob, json, sys, yaml
          failed = 0
          for f in sorted(glob.glob("cluster/services/grafana-*.yaml")):
              cm = yaml.safe_load(open(f))
              for key, val in (cm.get("data") or {}).items():
                  if not key.endswith(".json"):
                      continue
                  try:
                      json.loads(val)
                      print(f"OK  {f}:{key}")
                  except json.JSONDecodeError as e:
                      print(f"BAD {f}:{key} — {e}")
                      failed = 1
          sys.exit(failed)
          PY

  helm-dry-run:
    name: Helm dry-run
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create k3d cluster
        env:
          K3D_VERSION: v5.7.5
        run: |
          curl -fsSLo /tmp/k3d \
            "https://github.com/k3d-io/k3d/releases/download/${K3D_VERSION}/k3d-linux-amd64"
          install -m 755 /tmp/k3d /usr/local/bin/k3d
          k3d cluster create ci --wait --no-lb

      - name: Add helm repos
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo add nfs-subdir-external-provisioner \
            https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner/
          helm repo add node-feature-discovery \
            https://kubernetes-sigs.github.io/node-feature-discovery/charts
          helm repo update

      - name: Dry-run argocd
        run: |
          helm template argocd argo/argo-cd \
            --namespace argocd \
            -f cluster/helm/argocd/values.yaml > /dev/null

      - name: Dry-run kube-prometheus-stack
        run: |
          helm template kube-prometheus-stack \
            oci://ghcr.io/prometheus-community/charts/kube-prometheus-stack \
            --namespace monitoring \
            -f cluster/helm/kube-prometheus-stack/values.yaml > /dev/null

      - name: Validate Alertmanager config (amtool)
        env:
          AM_VERSION: "0.27.0"
        run: |
          # Extract the alertmanager.config block we maintain and lint it
          # (catches Go-template typos in the Grafana deep link, group_by, etc.)
          python3 - <<'PY'
          import yaml
          v = yaml.safe_load(open("cluster/helm/kube-prometheus-stack/values.yaml"))
          open("/tmp/am.yaml", "w").write(yaml.safe_dump(v["alertmanager"]["config"]))
          PY
          curl -fsSL "https://github.com/prometheus/alertmanager/releases/download/v${AM_VERSION}/alertmanager-${AM_VERSION}.linux-amd64.tar.gz" \
            | tar xz
          "./alertmanager-${AM_VERSION}.linux-amd64/amtool" check-config /tmp/am.yaml

      - name: Dry-run alloy
        run: |
          helm upgrade --install alloy grafana/alloy \
            --namespace monitoring --create-namespace \
            --dry-run \
            -f cluster/helm/alloy/values.yaml

      - name: Dry-run kubernetes-event-exporter
        run: |
          helm template kubernetes-event-exporter \
            oci://ghcr.io/ownkube/charts/kubernetes-events-exporter --version 0.1.2 \
            --namespace monitoring \
            -f cluster/helm/kubernetes-event-exporter/values.yaml > /dev/null

      - name: Dry-run nfs-subdir-external-provisioner
        run: |
          helm upgrade --install nfs-subdir-external-provisioner \
            nfs-subdir-external-provisioner/nfs-subdir-external-provisioner \
            --namespace kube-system \
            --dry-run \
            --set nfs.server=shoebox.vert \
            --set nfs.path=/export/storage/configs/kubernetes

      - name: Dry-run node-feature-discovery
        run: |
          helm upgrade --install node-feature-discovery \
            node-feature-discovery/node-feature-discovery \
            --namespace node-feature-discovery --create-namespace \
            --dry-run \
            -f cluster/helm/node-feature-discovery/values.yaml

      - name: Dry-run kubernetes-mcp-server
        run: |
          helm template kubernetes-mcp-server \
            oci://ghcr.io/containers/charts/kubernetes-mcp-server --version 0.1.0 \
            --namespace default \
            -f cluster/helm/kubernetes-mcp-server/values.yaml > /dev/null
