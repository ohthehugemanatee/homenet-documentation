name: kube-score

on:
  push:
    paths:
      - 'cluster/**/*.yaml'
      - '!cluster/ansible/**'
      - '!cluster/helm/**'
  pull_request:
    paths:
      - 'cluster/**/*.yaml'
      - '!cluster/ansible/**'
      - '!cluster/helm/**'

jobs:
  kube-score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kube-score
        run: |
          curl -sSfL \
            https://github.com/zegl/kube-score/releases/download/v1.19.0/kube-score_1.19.0_linux_amd64.tar.gz \
            | tar xzf - kube-score
          sudo mv kube-score /usr/local/bin/kube-score

      - name: Score manifests
        run: |
          find cluster -name '*.yaml' \
            -not -path '*/ansible/*' \
            -not -path '*/helm/*' \
            -not -path '*/wip/*' \
            -not -path '*/localdev/*' \
            -not -path '*/debugging/*' \
            | xargs kube-score score \
                --ignore-test pod-networkpolicy \
                --ignore-test deployment-has-poddisruptionbudget \
                --ignore-test deployment-has-host-podantiaffinity \
            || true
          # Non-blocking: pre-existing manifests have many findings.
          # Remove '|| true' once manifests are brought up to standard.
