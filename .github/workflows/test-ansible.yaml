name: Ansible tests

'on':
  push:
  pull_request:

jobs:

  monkeyble:
    name: Monkeyble rescue-logic tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: cluster/ansible
        run: pip install -r requirements.txt

      - name: Install Ansible collections
        working-directory: cluster/ansible
        run: ansible-galaxy collection install -r requirements.yaml

      - name: Create state directory
        run: |
          sudo mkdir -p /var/lib/ansible-upgrade
          sudo chown "$(whoami):$(whoami)" /var/lib/ansible-upgrade

      - name: Run Monkeyble scenarios
        working-directory: cluster/ansible
        run: bash tests/monkeyble/run-tests.sh

  molecule:
    name: Molecule node-state integration tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: cluster/ansible
        run: pip install -r requirements.txt

      - name: Install Ansible collections
        working-directory: cluster/ansible
        run: ansible-galaxy collection install -r requirements.yaml

      - name: Run Molecule tests
        id: molecule
        working-directory: cluster/ansible
        continue-on-error: true
        run: molecule test 2>&1 | tee /tmp/molecule-output.txt; exit "${PIPESTATUS[0]}"
        env:
          PY_COLORS: '0'
          ANSIBLE_FORCE_COLOR: '0'

      - name: Post molecule output as PR comment on failure
        if: steps.molecule.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/molecule-output.txt', 'utf8');
            const lines = output.split('\n');
            const tail = lines.slice(-150).join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Molecule test failure\n\`\`\`\n${tail}\n\`\`\``
            });

      - name: Fail if molecule failed
        if: steps.molecule.outcome == 'failure'
        run: exit 1
