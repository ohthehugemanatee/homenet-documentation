name: AI Review Gate

on:
  pull_request:
    types: [synchronize, reopened, ready_for_review]
  workflow_run:
    workflows: ["AI Infrastructure Review"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to post a passing check for (emergency unblock after confirmed review)'
        required: true
      sha:
        description: 'Exact head SHA to post the check on'
        required: true

permissions:
  pull-requests: write
  actions: read
  checks: write

jobs:
  gate:
    name: AI review required
    runs-on: ubuntu-latest
    steps:
      # When the review workflow just finished, mirror its result onto the PR head SHA.
      # This path runs on the default branch so we must create the check explicitly.
      - name: Mirror review result to PR head
        if: github.event_name == 'workflow_run'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const wf = context.payload.workflow_run;
            let headSha, prNumber;

            // PR-event triggered run: pull_requests is populated directly
            if (wf.pull_requests && wf.pull_requests.length > 0) {
              headSha = wf.pull_requests[0].head.sha;
              prNumber = wf.pull_requests[0].number;
            } else if (wf.event === 'workflow_dispatch' && wf.inputs && wf.inputs.pr_number) {
              // Dispatch-triggered run: look up the PR's current HEAD SHA
              prNumber = parseInt(wf.inputs.pr_number, 10);
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              headSha = pr.head.sha;
            } else if (wf.event === 'workflow_dispatch') {
              core.info('Workflow dispatch run has no pr_number input; skipping check post.');
              return;
            } else {
              core.info('No PR associated with this workflow run, skipping.');
              return;
            }

            const passed = wf.conclusion === 'success';
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'AI review required',
              head_sha: headSha,
              status: 'completed',
              conclusion: passed ? 'success' : 'failure',
              output: {
                title: passed ? 'AI review passed' : 'AI review required',
                summary: passed
                  ? 'The AI Infrastructure Review completed successfully.'
                  : `AI Infrastructure Review ended with conclusion: ${wf.conclusion}. Check the review workflow for details.`
              }
            });

      # Emergency unblock: manually post a passing check for a specific PR+SHA after a
      # confirmed passing review. Only use when the automated gate is stuck due to a bug.
      # Posts a PR comment for audit visibility.
      - name: Post passing check (emergency unblock)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const sha = '${{ inputs.sha }}';
            const prNumber = parseInt('${{ inputs.pr_number }}', 10);
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'AI review required',
              head_sha: sha,
              status: 'completed',
              conclusion: 'success',
              output: {
                title: 'AI review passed (manually confirmed)',
                summary: `AI Infrastructure Review result manually confirmed as passed for PR #${prNumber}.`
              }
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `**Manual gate override**: operator confirmed AI review passed and posted a synthetic \`AI review required\` check for \`${sha}\`. [Workflow run](${runUrl}) has the authorization context.`
            });
            core.info(`Posted passing check and PR comment for PR #${prNumber} at SHA ${sha}.`);

      # Verify a passing "AI review required" check exists for the PR's current HEAD SHA.
      # The workflow_run path above posts this check when a review completes. Scoped to
      # HEAD SHA so a stale review on an earlier commit does not satisfy a new push.
      - name: Check if AI review has passed
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          COUNT=$(gh api "/repos/$REPO/commits/$HEAD_SHA/check-runs" \
            --jq "[.check_runs[] | select(.name == \"AI review required\" and .conclusion == \"success\")] | length")
          if [ "${COUNT:-0}" -gt 0 ]; then
            echo "AI Infrastructure Review has passed for PR #$PR_NUMBER at $HEAD_SHA."
            exit 0
          fi
          echo "No passing AI Infrastructure Review found for $HEAD_SHA (PR #$PR_NUMBER)."
          echo "A review is likely running now. Wait for it, or trigger manually via:"
          echo "  Actions → AI Infrastructure Review → Run workflow (pr_number: $PR_NUMBER)"
          exit 1
