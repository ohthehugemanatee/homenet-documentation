name: AI Infrastructure Review

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get PR diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr.diff

      - name: Review with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import subprocess
          import sys
          import urllib.request
          import urllib.error

          with open('/tmp/pr.diff') as f:
              diff = f.read()

          if not diff.strip():
              print('Empty diff, skipping review')
              sys.exit(0)

          MAX_CHARS = 80000
          truncated = False
          if len(diff) > MAX_CHARS:
              cut = diff.rfind('\n', 0, MAX_CHARS)
              diff = diff[:cut if cut > 0 else MAX_CHARS]
              truncated = True

          fence = '```'
          trunc_note = '\n\n*(diff truncated due to size)*' if truncated else ''
          prompt = (
              'Review this infrastructure pull request focusing on:\n\n'
              '1. **Security vulnerabilities** - Exposed secrets or credentials, overly permissive RBAC/network policies,'
              ' unencrypted sensitive data, unsafe default configurations, and similar\n'
              '2. **Reliability and idempotency** - Non-idempotent tasks, missing error handling, race conditions,'
              ' operations that could cause downtime or data loss, and similar\n'
              '3. **Configuration quality** - Hardcoded IPs or hostnames that should be variables, missing resource'
              ' limits/requests, deprecated API versions, inconsistent naming conventions, and similar\n'
              '4. **Operational concerns** - Missing health checks, absent monitoring or alerting hooks, no rollback'
              ' strategy for destructive changes, missing backup considerations, and similar\n'
              '5. **Documentation** - Undocumented manual prerequisites, missing runbook entries for new failure modes,'
              ' outdated topology references, and similar\n\n'
              'Be concise. Only report actual issues, not style preferences.\n'
              'Format: `[SEVERITY: HIGH/MEDIUM/LOW] Issue description`\n\n'
              'Here is the pull request diff:\n\n'
              + fence + 'diff\n' + diff + '\n' + fence + trunc_note
          )

          payload = json.dumps({
              'model': 'claude-opus-4-7',
              'max_tokens': 2048,
              'messages': [{'role': 'user', 'content': prompt}]
          }).encode()

          req = urllib.request.Request(
              'https://api.anthropic.com/v1/messages',
              data=payload,
              headers={
                  'x-api-key': os.environ['ANTHROPIC_API_KEY'],
                  'anthropic-version': '2023-06-01',
                  'content-type': 'application/json',
              }
          )

          try:
              with urllib.request.urlopen(req, timeout=120) as resp:
                  result = json.loads(resp.read())
          except urllib.error.HTTPError as e:
              print(f'API error {e.code}: {e.read().decode()}')
              sys.exit(1)
          except Exception as e:
              print(f'Request failed: {e}')
              sys.exit(1)

          if result.get('type') == 'error':
              print(f"API returned error: {result.get('error')}")
              sys.exit(1)

          text_blocks = [
              b['text'] for b in result.get('content', [])
              if isinstance(b, dict) and b.get('type') == 'text'
          ]
          if not text_blocks:
              print('No text content in response')
              sys.exit(1)

          review = text_blocks[0]
          if result.get('stop_reason') == 'max_tokens':
              review += '\n\n*(review truncated: response hit token limit)*'

          body = '## AI Infrastructure Review\n\n' + review + '\n\n---\n*Automated review by Claude*'

          with open('/tmp/review.md', 'w') as f:
              f.write(body)

          subprocess.run(
              ['gh', 'pr', 'comment', os.environ['PR_NUMBER'],
               '--body-file', '/tmp/review.md',
               '--repo', os.environ['REPO']],
              check=True
          )
          print('Review posted successfully')
          PYEOF
