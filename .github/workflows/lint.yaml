name: Lint

'on':
  push:
  pull_request:

permissions:
  contents: read

jobs:

  yaml:
    name: YAML syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint
      - name: Run yamllint
        run: yamllint .

  k8s-manifests:
    name: Kubernetes manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kubeconform
        env:
          KUBECONFORM_VERSION: v0.7.0
        run: |
          curl -fsSLo /tmp/kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -xzf /tmp/kubeconform.tar.gz -C /usr/local/bin kubeconform
      - name: Validate manifests
        # Excludes ansible playbooks, helm values, and openbao compose files (not K8s manifests).
        # --ignore-missing-schemas skips custom CRDs (cert-manager, MetalLB, Longhorn).
        run: |
          find cluster -name "*.yaml" \
            ! -path "*/ansible/*" \
            ! -path "*/helm/*" \
            ! -path "*/openbao/*" \
            | xargs kubeconform \
              --ignore-missing-schemas \
              --kubernetes-version 1.29.0

  kustomize:
    name: Kustomize builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kustomize
        env:
          KUSTOMIZE_VERSION: v5.4.3
        run: |
          curl -fsSLo /tmp/kustomize.tar.gz \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/kustomize.tar.gz -C /usr/local/bin kustomize
          kustomize version
      - name: Build every kustomization
        # ArgoCD runs `kustomize build` at manifest-generation time. The
        # kubeconform job only validates raw YAML and never exercises
        # patches/overlays, so a kustomization that fails to build (bad patch
        # target, missing resource, invalid syntax) passes lint but breaks the
        # live ArgoCD sync. Building each one here reproduces what ArgoCD does
        # and fails CI on the same error.
        run: |
          set -euo pipefail
          find . -name kustomization.yaml -not -path '*/.git/*' -printf '%h\n' \
            | sort -u | while read -r dir; do
              echo "::group::kustomize build ${dir}"
              kustomize build "${dir}"
              echo "::endgroup::"
            done

  shell:
    name: Shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: find cluster shoebox -name "*.sh" -exec shellcheck {} +

  ansible:
    name: Ansible playbooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ansible and ansible-lint
        run: pip install ansible ansible-lint
      - name: Install collections
        run: ansible-galaxy collection install -r cluster/ansible/requirements.yaml
      - name: Run ansible-lint
        working-directory: cluster/ansible
        run: |
          ansible-lint k3s-agent.yaml node-state.yaml rolling-upgrade.yaml \
            ../../shoebox/shoebox-ansible-setup.yaml

  policy:
    name: Kubernetes policy (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kube-score
        env:
          KUBE_SCORE_VERSION: v1.20.0
        run: |
          curl -fsSLo /tmp/kube-score.tar.gz \
            "https://github.com/zegl/kube-score/releases/download/${KUBE_SCORE_VERSION}/kube-score_${KUBE_SCORE_VERSION#v}_linux_amd64.tar.gz"
          tar -xzf /tmp/kube-score.tar.gz -C /usr/local/bin kube-score
          kube-score version
      - name: Run kube-score
        # Advisory only (|| true) — many homelab workloads legitimately skip NetworkPolicy,
        # PodDisruptionBudgets, and strict security contexts. Review output and add
        # --ignore-test flags as appropriate when findings are confirmed acceptable.
        run: |
          find cluster -name "*.yaml" \
            ! -path "*/ansible/*" \
            ! -path "*/helm/*" \
            | xargs kube-score score \
              --ignore-test pod-networkpolicy,pod-poddisruptionbudget \
              --output-format ci || true

  polaris:
    name: Kubernetes best practices (Polaris, advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install polaris
        env:
          POLARIS_VERSION: 9.3.0
        run: |
          curl -fsSLo /tmp/polaris.tar.gz \
            "https://github.com/FairwindsOps/polaris/releases/download/${POLARIS_VERSION}/polaris_linux_amd64.tar.gz"
          tar -xzf /tmp/polaris.tar.gz -C /usr/local/bin polaris
          polaris version
      - name: Run polaris audit
        # Advisory only (|| true) — homelab workloads legitimately skip many
        # security best practices. Review output and add exemptions in .polaris.yaml
        # once findings are triaged.
        run: |
          polaris audit \
            --audit-path cluster \
            --format pretty || true

  trivy:
    name: IaC security scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install trivy
        env:
          TRIVY_VERSION: 0.71.0
        run: |
          TARBALL="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl -fsSLo "/tmp/${TARBALL}" \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/${TARBALL}"
          curl -fsSLo /tmp/trivy.checksums \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_checksums.txt"
          grep "${TARBALL}$" /tmp/trivy.checksums | (cd /tmp && sha256sum -c -)
          tar -xzf "/tmp/${TARBALL}" -C /usr/local/bin trivy
          trivy --version
      - name: Scan k8s manifests for misconfigurations
        run: |
          trivy config \
            --exit-code 1 \
            --severity CRITICAL,HIGH \
            --skip-files "cluster/services/cert-manager.yaml" \
            cluster
